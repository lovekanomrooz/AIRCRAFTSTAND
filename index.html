<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Stand Allocation - Technical Auditor</title>
    <style>
        :root { --safe: #2ecc71; --danger: #e74c3c; --accent: #f1c40f; --bg: #1a1a1a; --panel: #252525; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* Sidebar & Panels */
        #sidebar { width: 280px; background: var(--panel); padding: 20px; border-right: 2px solid #000; overflow-y: auto; }
        #audit-panel { width: 320px; background: var(--panel); padding: 20px; border-left: 2px solid #000; overflow-y: auto; }
        .ac-item { background: #34495e; padding: 10px; margin: 5px 0; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; border: 1px solid transparent; }
        .ac-item.selected { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }

        /* Viewport */
        #viewport { flex-grow: 1; overflow: auto; background: #111; position: relative; }
        svg { background: #151515; min-width: 5000px; height: 100%; }

        /* SVG Styles */
        .stand-box { fill: rgba(255,255,255,0.02); stroke: #444; stroke-width: 1; }
        .headerline { stroke: white; stroke-width: 3; }
        .t-mark { fill: var(--accent); opacity: 0.6; pointer-events: none; }
        .boundary-line { stroke: rgba(231, 76, 60, 0.3); stroke-width: 1; stroke-dasharray: 5,5; fill: none; }

        /* Swing Path */
        .swing-path { fill: rgba(255, 255, 255, 0.05); stroke-width: 2.5; pointer-events: none; }
        .safe { stroke: var(--safe); fill: rgba(46, 204, 113, 0.05); }
        .unsafe { stroke: var(--danger); fill: rgba(231, 76, 60, 0.15); }

        /* Aircraft */
        .ac-group { cursor: pointer; }
        .ac-group:hover .ac-body { stroke: #fff; stroke-width: 2; }
        .ac-body { fill: #fff; stroke: #333; transition: 0.2s; }
        .ac-wing { fill: #bdc3c7; stroke: #333; }
        .pivot-dot { fill: #ff4757; r: 3; }

        /* UI Helpers */
        #ghost-group { pointer-events: none; display: none; opacity: 0.5; }
        .audit-card { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #888; }
        .formula { font-family: monospace; color: var(--accent); display: block; margin: 5px 0; font-size: 0.9em; }
        .result-pass { color: var(--safe); font-weight: bold; }
        .result-fail { color: var(--danger); font-weight: bold; }
        #status-bar { position: absolute; top: 10px; left: 300px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; font-size: 12px; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="color: var(--safe)">✈️ คลังเครื่องบิน</h3>
    <div id="aircraft-list">โหลดข้อมูล...</div>
    <hr style="border:0.5px solid #444; margin:20px 0;">
    <div style="font-size: 0.8em; color: #aaa;">
        <b>ทิศทางการเลี้ยว:</b>
        <select id="turn-direction" style="width:100%; padding:5px; margin-top:5px; background:#444; color:white; border:none;" onchange="draw()">
            <option value="right">เลี้ยวขวา (Clockwise)</option>
            <option value="left">เลี้ยวซ้าย (Anticlockwise)</option>
        </select>
    </div>
    <button id="cancel-btn" onclick="cancelSelection()" style="display:none; width:100%; margin-top:15px; padding:10px; background:var(--danger); border:none; color:white; border-radius:4px; cursor:pointer;">ยกเลิก</button>
</div>

<div id="viewport">
    <div id="status-bar">🛰️ กำลังเชื่อมต่อข้อมูล...</div>
    <svg id="apron-svg" onmousemove="moveGhost(event)" onclick="handleSvgClick(event)">
        <defs>
            <marker id="arrow-safe" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
            <marker id="arrow-danger" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
        </defs>
        <g id="main-layer"></g>
        <g id="ghost-group">
            <path id="ghost-wing" d="" fill="#ced6e0" />
            <rect id="ghost-body" x="0" y="0" width="0" height="0" rx="8" fill="#fff" />
        </g>
    </svg>
</div>

<div id="audit-panel">
    <h3>🔍 ข้อมูลการตรวจสอบ</h3>
    <div id="audit-content">คลิกที่เครื่องบินเพื่อดูรายละเอียด...</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";
    let db = { aircrafts: [], stands: [] };
    let allocations = []; 
    let selectedAC = null;
    const SCALE = 4, HEADER_Y = 150;

    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            document.getElementById('status-bar').innerHTML = "🟢 ฐานข้อมูลออนไลน์";
            renderList();
            draw();
        } catch (e) { document.getElementById('status-bar').innerHTML = "🔴 เชื่อมต่อฐานข้อมูลล้มเหลว"; }
    }

    function renderList() {
        const list = document.getElementById('aircraft-list');
        list.innerHTML = '';
        db.aircrafts.forEach(ac => {
            const div = document.createElement('div');
            div.className = 'ac-item';
            div.innerText = ac.Model;
            div.onclick = () => selectAC(ac, div);
            list.appendChild(div);
        });
    }

    function selectAC(ac, el) {
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        selectedAC = ac;
        document.getElementById('ghost-group').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';
        updateGhostVisual();
    }

    function updateGhostVisual() {
        if (!selectedAC) return;
        const span = selectedAC.Span * SCALE, len = selectedAC.Length * SCALE, n2p = selectedAC.NoseToPivot * SCALE;
        document.getElementById('ghost-wing').setAttribute("d", `M 0,${n2p} L ${-span/2},${n2p+10} L ${span/2},${n2p+10} Z`);
        document.getElementById('ghost-body').setAttribute("x", -span/16);
        document.getElementById('ghost-body').setAttribute("width", span/8);
        document.getElementById('ghost-body').setAttribute("height", len);
    }

    function cancelSelection() {
        selectedAC = null;
        document.getElementById('ghost-group').style.display = 'none';
        document.getElementById('cancel-btn').style.display = 'none';
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
    }

    function moveGhost(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        document.getElementById('ghost-group').setAttribute("transform", `translate(${pt.x}, ${pt.y})`);
    }

    function getSvgPt(e) {
        const svg = document.getElementById('apron-svg');
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function handleSvgClick(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        
        // ค้นหาหลุมจอดและจุด Snap
        let targetStand = null;
        let snapY = pt.y, snapX = pt.x;

        db.stands.forEach(st => {
            const cx = getStandCenterX(st);
            const hw = (st.Width * SCALE) / 2;
            if (pt.x >= cx - hw && pt.x <= cx + hw) {
                targetStand = st;
                // Snap Logic (T1: 12.5m, T2: 30m)
                const t1 = HEADER_Y + (12.5 * SCALE), t2 = HEADER_Y + (30.0 * SCALE);
                if (Math.abs(pt.y - t1) < 40) { snapY = t1; snapX = cx; }
                else if (Math.abs(pt.y - t2) < 40) { snapY = t2; snapX = cx; }
            }
        });

        if (targetStand) {
            allocations.push({ 
                standId: targetStand.StandID, 
                model: selectedAC.Model, 
                x: snapX, y: snapY, 
                turnDir: document.getElementById('turn-direction').value 
            });
            cancelSelection();
            draw();
        }
    }

    function getStandCenterX(st) {
        let curX = 100;
        for (let s of db.stands) {
            const w = s.Width * SCALE;
            const cx = s.ParentID ? getStandCenterX(db.stands.find(p => p.StandID === s.ParentID)) + (s.OffsetX * SCALE) : curX + (w / 2);
            if (s.StandID === st.StandID) return cx;
            if (!s.ParentID) curX += w; // ขอบชิดติดกัน (Gap = 0)
        }
    }

    function draw() {
        const layer = document.getElementById('main-layer');
        layer.innerHTML = '';
        let curX = 100;
        let xMap = {};

        db.stands.forEach(st => {
            const sw = st.Width * SCALE, sl = st.Length * SCALE;
            let cx = st.ParentID ? xMap[st.ParentID] + (st.OffsetX * SCALE) : curX + (sw / 2);
            xMap[st.StandID] = cx;
            layer.innerHTML += `<rect x="${cx - sw/2}" y="${HEADER_Y}" width="${sw}" height="${sl}" class="stand-box" />`;
            layer.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 12.5*SCALE}" r="6" class="t-mark" />`;
            layer.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 30.0*SCALE}" r="6" class="t-mark" />`;
            layer.innerHTML += `<text x="${cx}" y="${HEADER_Y + sl + 20}" fill="#888" text-anchor="middle" font-size="11">${st.StandID}</text>`;
            if (!st.ParentID) curX += sw;
        });

        let auditHTML = "";
        allocations.forEach((alloc, idx) => {
            const ac = db.aircrafts.find(a => a.Model === alloc.model);
            const turnDir = alloc.turnDir;
            
            // Pivot & Sweep Logic
            const pDist = ac.NoseToPivot * SCALE, pOff = ac.PivotOffset * SCALE, r = ac.SweepRadius * SCALE;
            const mlgCy = alloc.y + pDist;
            const pivotX = (turnDir === 'right') ? alloc.x + pOff : alloc.x - pOff;
            
            // Check Conflict
            const isDanger = checkSafety(alloc, idx);

            // วาดรัศมีการเลี้ยว (Swing Path) อยู่ด้านหน้าเสมอ
            const marker = isDanger ? 'url(#arrow-danger)' : 'url(#arrow-safe)';
            const startAngle = (turnDir === 'right') ? Math.PI : 0;
            const endAngle = (turnDir === 'right') ? 1.5 * Math.PI : 1.5 * Math.PI;
            
            // Path Arc จาก ด้านข้าง -> ด้านบน (หัวเครื่อง)
            const x1 = pivotX + Math.cos(startAngle) * r;
            const y1 = mlgCy + Math.sin(startAngle) * r;
            const x2 = pivotX;
            const y2 = mlgCy - r;

            const d = `M ${x1} ${y1} A ${r} ${r} 0 0 ${(turnDir === 'right') ? 1 : 0} ${x2} ${y2}`;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d);
            path.setAttribute("class", `swing-path ${isDanger ? 'unsafe' : 'safe'}`);
            path.setAttribute("style", `marker-end: ${marker}`);
            layer.appendChild(path);

            // วาดตัวเครื่อง
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${alloc.x}, ${alloc.y})`);
            g.innerHTML = `
                <path d="M 0,${pDist} L ${-ac.Span*SCALE/2},${pDist+10} L ${ac.Span*SCALE/2},${pDist+10} Z" class="ac-wing" />
                <rect x="${-ac.Span*SCALE/16}" y="0" width="${ac.Span*SCALE/8}" height="${ac.Length*SCALE}" rx="8" class="ac-body" />
                <circle cx="0" cy="0" r="4" fill="red" />
                <circle cx="${(turnDir === 'right') ? pOff : -pOff}" cy="${pDist}" class="pivot-dot" />
            `;
            g.onclick = (e) => { e.stopPropagation(); updateAudit(alloc, isDanger); };
            g.ondblclick = (e) => { e.stopPropagation(); allocations.splice(idx, 1); draw(); };
            layer.appendChild(g);
        });
    }

    function checkSafety(alloc, myIdx) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const reach = (ac.PivotOffset + ac.SweepRadius);
        return allocations.some((other, otIdx) => {
            if (myIdx === otIdx) return false;
            const oAc = db.aircrafts.find(a => a.Model === other.model);
            const dist = Math.abs(alloc.x - other.x) / SCALE;
            const isCorrectSide = (alloc.turnDir === 'left' && other.x < alloc.x) || (alloc.turnDir === 'right' && other.x > alloc.x);
            return isCorrectSide && (reach + oAc.Span/2 > dist);
        });
    }

    function updateAudit(alloc, isDanger) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const totalReach = ac.PivotOffset + ac.SweepRadius;
        document.getElementById('audit-content').innerHTML = `
            <div class="audit-card" style="border-left-color: ${isDanger ? 'var(--danger)' : 'var(--safe)'}">
                <b>📍 หลุม: ${alloc.standId}</b><br>
                อากาศยาน: ${ac.Model}<br>
                ทิศทางเลี้ยว: ${alloc.turnDir === 'right' ? 'ขวา' : 'ซ้าย'}<hr>
                <span class="formula">R_total = PivotOffset + SweepRadius</span>
                <span class="formula">${ac.PivotOffset}m + ${ac.SweepRadius}m = ${totalReach.toFixed(2)}m</span>
                <p>สถานะ: <span class="${isDanger ? 'result-fail' : 'result-pass'}">
                    ${isDanger ? '❌ ตรวจพบการชนเครื่องข้างๆ' : '✅ ปลอดภัย (Clearance OK)'}
                </span></p>
            </div>
        `;
    }

    function cancelSelection() {
        selectedAC = null;
        document.getElementById('ghost-group').style.display = 'none';
        document.getElementById('cancel-btn').style.display = 'none';
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
    }

    init();
</script>
</body>
</html>
