<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Stand Planner Pro - Real Scale & Wingtip Clearance</title>
    <style>
        :root { --safe: #2ecc71; --danger: #e74c3c; --accent: #f1c40f; --bg: #1a1a1a; --panel: #252525; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--panel); padding: 20px; border-right: 2px solid #000; overflow-y: auto; }
        #audit-panel { width: 340px; background: var(--panel); padding: 20px; border-left: 2px solid #000; overflow-y: auto; }
        
        .ac-item { background: #34495e; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; }
        .ac-item.selected { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }

        #viewport { flex-grow: 1; overflow: auto; background: #111; position: relative; }
        svg { background: #151515; min-width: 5000px; height: 100%; }

        /* SVG Styles */
        .stand-box { fill: rgba(255,255,255,0.02); stroke: #444; stroke-width: 1; }
        .headerline { stroke: white; stroke-width: 3; }
        .t-mark { fill: var(--accent); opacity: 0.6; pointer-events: none; }

        /* Swing Path (180 Deg Arc) */
        .swing-path { fill: rgba(255, 255, 255, 0.05); stroke-width: 3; pointer-events: none; }
        .safe { stroke: var(--safe); fill: rgba(46, 204, 113, 0.08); }
        .unsafe { stroke: var(--danger); fill: rgba(231, 76, 60, 0.15); }

        /* Clearance Measurement */
        .clearance-line { stroke: #3498db; stroke-width: 2; stroke-dasharray: 4; }
        .clearance-text { fill: #3498db; font-size: 13px; font-weight: bold; }

        .ac-body { fill: #fff; stroke: #333; }
        .ac-wing { fill: #bdc3c7; stroke: #333; }
        .pivot-dot { fill: #ff4757; r: 4; }

        .audit-card { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        #status-bar { position: absolute; top: 10px; left: 300px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="color: var(--safe)">✈️ เลือกเครื่องบิน</h3>
    <div id="aircraft-list">โหลดข้อมูล...</div>
    <hr style="border:0.5px solid #444; margin:20px 0;">
    <div style="font-size: 0.8em; color: #aaa;">
        <b>การใช้งาน:</b><br>
        1. คลิกเครื่องบิน -> คลิกวางที่จุด T1/T2<br>
        2. <b>คลิกที่เครื่องบินที่วางแล้ว</b> เพื่อเปลี่ยนทิศทางเลี้ยว (ซ้าย/ขวา/ทั้งคู่)<br>
        3. ดับเบิลคลิกเพื่อลบออก
    </div>
</div>

<div id="viewport">
    <div id="status-bar">🛰️ กำลังดึงข้อมูล GS...</div>
    <svg id="apron-svg" onmousemove="moveGhost(event)" onclick="handleSvgClick(event)">
        <defs>
            <marker id="arrow-safe" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
            <marker id="arrow-danger" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
        </defs>
        <g id="main-layer"></g>
        <g id="ghost-group" style="display:none; pointer-events:none; opacity:0.4;">
            <path id="ghost-wing" d="" fill="#ced6e0" />
            <rect id="ghost-body" x="0" y="0" width="0" height="0" rx="8" fill="#fff" />
        </g>
    </svg>
</div>

<div id="audit-panel">
    <h3>🔍 สรุปการตรวจสอบ</h3>
    <div id="audit-content">เลือกเครื่องบินบนลานจอดเพื่อดูระยะห่าง...</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";
    let db = { aircrafts: [], stands: [] };
    let allocations = []; 
    let selectedAC = null;
    const SCALE = 4; // มาตราส่วน 1 เมตร = 4 พิกเซล
    const HEADER_Y = 150;

    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            document.getElementById('status-bar').innerHTML = "🟢 เชื่อมต่อข้อมูลสำเร็จ (มาตราส่วน 1:" + (100/SCALE) + ")";
            renderList();
            draw();
        } catch (e) { document.getElementById('status-bar').innerHTML = "🔴 เชื่อมต่อฐานข้อมูลล้มเหลว"; }
    }

    function renderList() {
        const list = document.getElementById('aircraft-list');
        list.innerHTML = '';
        db.aircrafts.forEach(ac => {
            const div = document.createElement('div');
            div.className = 'ac-item';
            div.innerText = ac.Model;
            div.onclick = () => {
                document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                selectedAC = ac;
                document.getElementById('ghost-group').style.display = 'block';
                updateGhostVisual();
            };
            list.appendChild(div);
        });
    }

    function updateGhostVisual() {
        const span = selectedAC.Span * SCALE, n2p = selectedAC.NoseToPivot * SCALE;
        document.getElementById('ghost-wing').setAttribute("d", `M 0,${n2p} L ${-span/2},${n2p+10} L ${span/2},${n2p+10} Z`);
        document.getElementById('ghost-body').setAttribute("x", -span/16);
        document.getElementById('ghost-body').setAttribute("width", span/8);
        document.getElementById('ghost-body').setAttribute("height", selectedAC.Length * SCALE);
    }

    function moveGhost(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        document.getElementById('ghost-group').setAttribute("transform", `translate(${pt.x}, ${pt.y})`);
    }

    function getSvgPt(e) {
        const svg = document.getElementById('apron-svg');
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function handleSvgClick(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        let targetStand = null;
        let snapY = pt.y, snapX = pt.x;

        db.stands.forEach(st => {
            const cx = getStandCenterX(st);
            const hw = (st.Width * SCALE) / 2;
            if (pt.x >= cx - hw && pt.x <= cx + hw) {
                targetStand = st;
                const t1 = HEADER_Y + (12.5 * SCALE), t2 = HEADER_Y + (30.0 * SCALE);
                if (Math.abs(pt.y - t1) < 40) { snapY = t1; snapX = cx; }
                else if (Math.abs(pt.y - t2) < 40) { snapY = t2; snapX = cx; }
            }
        });

        if (targetStand) {
            allocations.push({ 
                standId: targetStand.StandID, 
                model: selectedAC.Model, 
                x: snapX, y: snapY, 
                turnMode: 0 // 0=Right, 1=Left, 2=Both
            });
            selectedAC = null;
            document.getElementById('ghost-group').style.display = 'none';
            document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
            draw();
        }
    }

    function getStandCenterX(st) {
        let curX = 100;
        for (let s of db.stands) {
            const w = s.Width * SCALE;
            const cx = s.ParentID ? getStandCenterX(db.stands.find(p => p.StandID === s.ParentID)) + (s.OffsetX * SCALE) : curX + (w / 2);
            if (s.StandID === st.StandID) return cx;
            if (!s.ParentID) curX += w;
        }
    }

    function draw() {
        const layer = document.getElementById('main-layer');
        layer.innerHTML = '';
        let curX = 100;
        let xMap = {};

        db.stands.forEach(st => {
            const sw = st.Width * SCALE, sl = st.Length * SCALE;
            let cx = st.ParentID ? xMap[st.ParentID] + (st.OffsetX * SCALE) : curX + (sw / 2);
            xMap[st.StandID] = cx;
            layer.innerHTML += `<rect x="${cx - sw/2}" y="${HEADER_Y}" width="${sw}" height="${sl}" class="stand-box" />`;
            layer.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 12.5*SCALE}" r="6" class="t-mark" />`;
            layer.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 30.0*SCALE}" r="6" class="t-mark" />`;
            layer.innerHTML += `<text x="${cx}" y="${HEADER_Y + sl + 20}" fill="#888" text-anchor="middle" font-size="11">${st.StandID}</text>`;
            if (!st.ParentID) curX += sw;
        });

        allocations.forEach((alloc, idx) => {
            const ac = db.aircrafts.find(a => a.Model === alloc.model);
            const span = ac.Span * SCALE, pDist = ac.NoseToPivot * SCALE, pOff = ac.PivotOffset * SCALE, r = ac.SweepRadius * SCALE;
            const mlgY = alloc.y + pDist;

            // ตรวจสอบความปลอดภัย
            const isDanger = checkConflict(alloc, idx, xMap);

            // วาดรัศมี 180 องศา (ด้านหน้า)
            if (alloc.turnMode === 0 || alloc.turnMode === 2) { // เลี้ยวขวา (หมุนรอบซ้าย)
                draw180Arc(layer, alloc.x + pOff, mlgY, r, true, isDanger);
            }
            if (alloc.turnMode === 1 || alloc.turnMode === 2) { // เลี้ยวซ้าย (หมุนรอบขวา)
                draw180Arc(layer, alloc.x - pOff, mlgY, r, false, isDanger);
            }

            // วาดตัวเครื่อง
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${alloc.x}, ${alloc.y})`);
            g.innerHTML = `
                <path d="M 0,${pDist} L ${-span/2},${pDist+10} L ${span/2},${pDist+10} Z" class="ac-wing" />
                <rect x="${-span/16}" y="0" width="${span/8}" height="${ac.Length*SCALE}" rx="8" class="ac-body" />
                <circle cx="0" cy="0" r="4" fill="red" />
                <circle cx="${pOff}" cy="${pDist}" class="pivot-dot" />
                <circle cx="${-pOff}" cy="${pDist}" class="pivot-dot" />
            `;
            g.onclick = (e) => { e.stopPropagation(); alloc.turnMode = (alloc.turnMode + 1) % 3; draw(); updateAudit(alloc, idx, xMap); };
            g.ondblclick = (e) => { e.stopPropagation(); allocations.splice(idx, 1); draw(); };
            layer.appendChild(g);

            // วาดเส้นวัดระยะห่างปลายปีก
            drawClearanceLine(layer, alloc, idx, xMap);
        });
    }

    function draw180Arc(layer, px, py, r, isRightTurn, isDanger) {
        const marker = isDanger ? 'url(#arrow-danger)' : 'url(#arrow-safe)';
        // วาดครึ่งวงกลม (180 องศา) กวาดจากด้านข้างขึ้นไปด้านบนและไปจบอีกด้าน
        const startX = isRightTurn ? px + r : px - r;
        const endX = isRightTurn ? px - r : px + r;
        
        const d = `M ${startX} ${py} A ${r} ${r} 0 0 ${isRightTurn ? 0 : 1} ${endX} ${py}`;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d);
        path.setAttribute("class", `swing-path ${isDanger ? 'unsafe' : 'safe'}`);
        path.setAttribute("style", `marker-end: ${marker}`);
        layer.appendChild(path);
    }

    function checkConflict(alloc, myIdx, xMap) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const reach = ac.PivotOffset + ac.SweepRadius;
        return allocations.some((other, otIdx) => {
            if (myIdx === otIdx) return false;
            const oAc = db.aircrafts.find(a => a.Model === other.model);
            const dist = Math.abs(alloc.x - other.x) / SCALE;
            // เช็คว่ารัศมีกวาดทับปีกเครื่องข้างๆ หรือไม่
            const isCorrectSide = (alloc.turnMode !== 1 && other.x > alloc.x) || (alloc.turnMode !== 0 && other.x < alloc.x);
            return isCorrectSide && (reach + oAc.Span/2 > dist);
        });
    }

    function drawClearanceLine(layer, alloc, idx, xMap) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const myRightWing = alloc.x + (ac.Span * SCALE / 2);
        
        // หาเครื่องบินทางขวาที่ใกล้ที่สุด
        let neighbor = null, minDist = Infinity;
        allocations.forEach((other, otIdx) => {
            if (other.x > alloc.x && (other.x - alloc.x) < minDist) {
                minDist = other.x - alloc.x;
                neighbor = other;
            }
        });

        if (neighbor) {
            const oAc = db.aircrafts.find(a => a.Model === neighbor.model);
            const nLeftWing = neighbor.x - (oAc.Span * SCALE / 2);
            const gap = (nLeftWing - myRightWing) / SCALE;

            const y = alloc.y + (ac.NoseToPivot * SCALE) + 20;
            layer.innerHTML += `
                <line x1="${myRightWing}" y1="${y}" x2="${nLeftWing}" y2="${y}" class="clearance-line" />
                <text x="${(myRightWing + nLeftWing)/2}" y="${y - 5}" class="clearance-text" text-anchor="middle">Gap: ${gap.toFixed(2)}m</text>
            `;
        }
    }

    function updateAudit(alloc, idx, xMap) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const content = document.getElementById('audit-content');
        const modes = ["เลี้ยวขวา (Pivot LH)", "เลี้ยวซ้าย (Pivot RH)", "แสดงทั้งสองฝั่ง"];
        
        content.innerHTML = `
            <div class="audit-card">
                <b>หลุม: ${alloc.standId}</b><br>
                โหมด: ${modes[alloc.turnMode]}<br>
                กว้างปีก: ${ac.Span}m<br>
                รัศมีกวาด (R4): ${ac.SweepRadius}m<hr>
                <span style="font-size:0.8em; color:#aaa;">*มาตราส่วนตรวจสอบ 1:${(100/SCALE).toFixed(0)} (Real-scale)</span>
            </div>
        `;
    }

    init();
</script>
</body>
</html>
