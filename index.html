<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Stand Planner Pro - Static & Dynamic Audit</title>
    <style>
        :root { --safe: #2ecc71; --danger: #e74c3c; --accent: #f1c40f; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* Top Bar */
        #top-bar { height: 120px; background: var(--panel); border-bottom: 2px solid #000; padding: 10px 20px; display: flex; gap: 20px; align-items: center; z-index: 100; }
        .ac-list-container { display: flex; gap: 10px; overflow-x: auto; flex-grow: 1; }
        .ac-item { min-width: 130px; background: #34495e; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.2s; }
        .ac-item.selected { background: var(--accent); color: #000; }

        /* Main Container */
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        #viewport { flex-grow: 1; overflow: auto; background: #0b0b0b; position: relative; }
        
        /* ขยายและปลดล็อคขนาด Audit Panel */
        #audit-panel { 
            width: 550px; /* ขยายความกว้าง */
            min-width: 550px; 
            background: var(--panel); 
            padding: 25px; 
            overflow-y: auto; 
            border-left: 2px solid #333;
            box-shadow: -10px 0 20px rgba(0,0,0,0.5);
        }

        svg { background: #111; min-width: 5000px; height: 100%; }

        /* SVG Components */
        .stand-box { fill: rgba(255,255,255,0.02); stroke: #444; stroke-width: 1; }
        .headerline { stroke: white; stroke-width: 3; }
        .t-mark { fill: var(--accent); opacity: 0.5; pointer-events: none; }
        
        .swing-path { fill: rgba(255, 255, 255, 0.03); stroke-width: 4; pointer-events: none; }
        .safe { stroke: var(--safe); fill: rgba(46, 204, 113, 0.05); }
        .unsafe { stroke: var(--danger); fill: rgba(231, 76, 60, 0.15); }
        
        /* Clearance Line (ระหว่างปีก) */
        .wing-gap-line { stroke: #3498db; stroke-width: 2.5; stroke-dasharray: 6; }
        .wing-gap-text { fill: #3498db; font-size: 14px; font-weight: bold; background: black; }

        .ac-body { fill: #fff; stroke: #333; }
        .ac-wing { fill: #bdc3c7; stroke: #333; }
        .pivot-dot { fill: #ff4757; r: 6; pointer-events: none; }

        /* Audit Card */
        .audit-card { background: #2c3e50; padding: 20px; border-radius: 12px; border-top: 8px solid var(--accent); line-height: 1.8; margin-bottom: 20px; }
        .formula { font-family: monospace; color: var(--accent); display: block; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; margin: 8px 0; font-size: 1.05rem; }
        .res-highlight { font-size: 1.4rem; font-weight: bold; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<header id="top-bar">
    <div style="min-width: 220px;">
        <label>🛠️ Extra Margin:</label><br>
        <input type="number" id="extra-margin" style="width:80px; padding:8px; border-radius:4px;" value="0" oninput="draw()"> <b>m.</b>
    </div>
    <div class="ac-list-container" id="aircraft-list"></div>
    <button id="cancel-btn" onclick="cancelSelection()" style="display:none; padding:10px; background:var(--danger); color:white; border:none; border-radius:5px; cursor:pointer;">ยกเลิก</button>
</header>

<div id="main-container">
    <div id="viewport">
        <svg id="apron-svg" onmousemove="moveGhost(event)" onclick="handleSvgClick(event)">
            <defs>
                <marker id="arrow-safe" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
                <marker id="arrow-danger" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
            </defs>
            <g id="main-layer"></g>
            <g id="ghost-group" style="display:none; pointer-events:none; opacity:0.3;">
                <path id="ghost-wing" d="" fill="#ced6e0" /><rect id="ghost-body" rx="8" fill="#fff" />
            </g>
        </svg>
    </div>

    <div id="audit-panel">
        <h2 style="color: var(--accent); margin-top: 0;">🔍 TECHNICAL AUDIT</h2>
        <div id="audit-content">คลิกเลือกอากาศยานเพื่อตรวจสอบระยะห่างปลอดภัย...</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";
    let db = { aircrafts: [], stands: [], clearanceRules: [] };
    let allocations = []; 
    let selectedAC = null, xMap = {};
    const SCALE = 4, HEADER_Y = 100;

    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            renderList();
            draw();
        } catch (e) { alert("Error connecting to GS"); }
    }

    function renderList() {
        const list = document.getElementById('aircraft-list');
        list.innerHTML = '';
        db.aircrafts.forEach(ac => {
            const div = document.createElement('div');
            div.className = 'ac-item';
            div.innerText = ac.Model;
            div.onclick = () => {
                document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                selectedAC = ac;
                document.getElementById('ghost-group').style.display = 'block';
                updateGhostVisual();
            };
            list.appendChild(div);
        });
    }

    function updateGhostVisual() {
        const span = selectedAC.Span * SCALE, n2p = selectedAC.NoseToPivot * SCALE;
        document.getElementById('ghost-wing').setAttribute("d", `M 0,${n2p} L ${-span/2},${n2p+10} L ${span/2},${n2p+10} Z`);
        document.getElementById('ghost-body').setAttribute("x", -span/16);
        document.getElementById('ghost-body').setAttribute("width", span/8);
        document.getElementById('ghost-body').setAttribute("height", selectedAC.Length * SCALE);
    }

    function moveGhost(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        document.getElementById('ghost-group').setAttribute("transform", `translate(${pt.x}, ${pt.y})`);
    }

    function getSvgPt(e) {
        const svg = document.getElementById('apron-svg');
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function handleSvgClick(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        let bestSt = null, snapX, snapY;
        const sorted = [...db.stands].sort((a,b) => (b.ParentID ? 1 : 0) - (a.ParentID ? 1 : 0));
        
        for (let st of sorted) {
            const cx = xMap[st.StandID], hw = (st.Width * SCALE) / 2;
            if (pt.x >= cx - hw && pt.x <= cx + hw) {
                bestSt = st.StandID;
                const t1 = HEADER_Y + (12.5*SCALE), t2 = HEADER_Y + (30*SCALE);
                snapY = Math.abs(pt.y - t1) < 40 ? t1 : (Math.abs(pt.y - t2) < 40 ? t2 : null);
                snapX = cx;
                if (snapY) break;
            }
        }

        if (bestSt && snapY) {
            allocations.push({ standId: bestSt, model: selectedAC.Model, x: snapX, y: snapY, turnMode: 0 });
            cancelSelection();
            draw();
        }
    }

    function draw() {
        const layer = document.getElementById('main-layer');
        layer.innerHTML = '';
        const margin = parseFloat(document.getElementById('extra-margin').value) || 0;
        let curX = 50; xMap = {};

        db.stands.forEach(st => {
            const sw = st.Width * SCALE, sl = st.Length * SCALE;
            let cx = (st.ParentID && xMap[st.ParentID]) ? xMap[st.ParentID] + (st.OffsetX * SCALE) : (curX + sw/2);
            xMap[st.StandID] = cx;
            if (!st.ParentID) curX += sw;

            layer.innerHTML += `<rect x="${cx-sw/2}" y="${HEADER_Y}" width="${sw}" height="${sl}" class="stand-box ${st.ParentID?'':'stand-parent'}" />`;
            layer.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 12.5*SCALE}" r="6" class="t-mark" />`;
            layer.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 30*SCALE}" r="6" class="t-mark" />`;
            layer.innerHTML += `<text x="${cx}" y="${HEADER_Y + sl + 20}" fill="#888" text-anchor="middle" font-size="11">${st.StandID}</text>`;
        });

        allocations.forEach((alloc, idx) => {
            const ac = db.aircrafts.find(a => a.Model === alloc.model);
            const pOff = ac.PivotOffset * SCALE, r = (ac.SweepRadius + margin) * SCALE, mlgY = alloc.y + (ac.NoseToPivot * SCALE);
            const isDanger = checkDynamicSafety(alloc, idx, margin);

            if (alloc.turnMode === 0) drawArc(layer, alloc.x + pOff, mlgY, r, true, isDanger); // Right Turn
            else drawArc(layer, alloc.x - pOff, mlgY, r, false, isDanger); // Left Turn

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${alloc.x}, ${alloc.y})`);
            g.innerHTML = `
                <path d="M 0,${ac.NoseToPivot*SCALE} L ${-ac.Span*SCALE/2},${(ac.NoseToPivot*SCALE)+10} L ${ac.Span*SCALE/2},${(ac.NoseToPivot*SCALE)+10} Z" class="ac-wing" />
                <rect x="${-ac.Span*SCALE/16}" y="0" width="${ac.Span*SCALE/8}" height="${ac.Length*SCALE}" rx="8" class="ac-body" />
                <circle cx="0" cy="0" r="4" fill="red" />
                <circle cx="${alloc.turnMode === 0 ? pOff : -pOff}" cy="${ac.NoseToPivot*SCALE}" class="pivot-dot" />
            `;
            g.onclick = (e) => { e.stopPropagation(); alloc.turnMode = 1 - alloc.turnMode; draw(); updateAudit(alloc, idx, margin); };
            g.ondblclick = (e) => { e.stopPropagation(); allocations.splice(idx, 1); draw(); };
            layer.appendChild(g);

            drawStaticClearance(layer, alloc, idx);
        });
    }

    function drawArc(layer, px, py, r, isRight, isDanger) {
        const marker = isDanger ? 'url(#arrow-danger)' : 'url(#arrow-safe)';
        const d = isRight ? `M ${px - r} ${py} A ${r} ${r} 0 0 1 ${px + r} ${py}` : `M ${px + r} ${py} A ${r} ${r} 0 0 0 ${px - r} ${py}`;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute("d", d);
        p.setAttribute("class", `swing-path ${isDanger?'unsafe':'safe'}`);
        p.setAttribute("style", `marker-end: ${marker}`);
        layer.appendChild(p);
    }

    function checkDynamicSafety(alloc, idx, margin) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const reach = ac.PivotOffset + ac.SweepRadius + margin;
        return allocations.some((other, otIdx) => {
            if (idx === otIdx) return false;
            const oAc = db.aircrafts.find(a => a.Model === other.model);
            const dist = Math.abs(alloc.x - other.x) / SCALE;
            const isToward = (alloc.turnMode === 0 && other.x > alloc.x) || (alloc.turnMode === 1 && other.x < alloc.x);
            return isToward && (reach + oAc.Span/2 > dist);
        });
    }

    function drawStaticClearance(layer, alloc, idx) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const myRightWing = alloc.x + (ac.Span * SCALE / 2);
        
        allocations.forEach(other => {
            if (other.x > alloc.x && (other.x - alloc.x) < 400) {
                const oAc = db.aircrafts.find(a => a.Model === other.model);
                const otherLeftWing = other.x - (oAc.Span * SCALE / 2);
                const gap = (otherLeftWing - myRightWing) / SCALE;
                const lineY = alloc.y + (ac.NoseToPivot * SCALE) + 30;

                layer.innerHTML += `<line x1="${myRightWing}" y1="${lineY}" x2="${otherLeftWing}" y2="${lineY}" class="wing-gap-line" />`;
                layer.innerHTML += `<text x="${(myRightWing+otherLeftWing)/2}" y="${lineY-8}" text-anchor="middle" class="wing-gap-text">${gap.toFixed(2)}m</text>`;
            }
        });
    }

    function updateAudit(alloc, idx, margin) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const rule = db.clearanceRules.find(r => r.Code === ac.Code) || { MinClearance: 4.5 };
        const totalReach = ac.PivotOffset + ac.SweepRadius + margin;
        
        let neighbor = null, minDist = Infinity;
        allocations.forEach((other, otIdx) => {
            if (idx === otIdx) return;
            const isToward = (alloc.turnMode === 0 && other.x > alloc.x) || (alloc.turnMode === 1 && other.x < alloc.x);
            const d = Math.abs(alloc.x - other.x) / SCALE;
            if (isToward && d < minDist) { minDist = d; neighbor = other; }
        });

        let content = `<div class="audit-card"><b>📍 ${alloc.standId} (${ac.Model})</b><br>`;
        content += `Type Code: <b>${ac.Code}</b> | กฎระยะห่างขั้นต่ำ: <b>${rule.MinClearance}m</b><hr>`;
        
        if (neighbor) {
            const oAc = db.aircrafts.find(a => a.Model === neighbor.model);
            const staticGap = (Math.abs(alloc.x - other.x) / SCALE) - (ac.Span/2 + oAc.Span/2);
            const dynamicGap = minDist - (totalReach + oAc.Span/2);
            const isDanger = dynamicGap < 0 || staticGap < rule.MinClearance;

            content += `เทียบกับข้างเคียง: ${neighbor.model}<br>`;
            content += `<span class="formula">1. ระยะห่างปีกขณะจอด (Static): ${staticGap.toFixed(2)}m</span>`;
            content += `<span class="formula">2. ระยะห่างขณะเลี้ยว (Dynamic): ${dynamicGap.toFixed(2)}m</span>`;
            
            content += `<div class="res-box" style="background:${isDanger ? 'rgba(231,76,60,0.2)' : 'rgba(46,204,113,0.2)'}; color:${isDanger ? 'var(--danger)' : 'var(--safe)'}">`;
            content += `${isDanger ? '❌ ไม่ผ่านมาตรฐาน' : '✅ ปลอดภัยตามมาตรฐาน'}</div>`;
        } else {
            content += `<p style="text-align:center; color:#888;">ไม่พบอากาศยานในทิศทางที่เลี้ยว</p>`;
        }
        content += `</div>`;
        document.getElementById('audit-content').innerHTML = content;
    }

    function cancelSelection() {
        selectedAC = null;
        document.getElementById('ghost-group').style.display = 'none';
        document.getElementById('cancel-btn').style.display = 'none';
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
    }

    init();
</script>
</body>
</html>
