<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบคำนวณหลุมจอดมาตรฐาน (Advanced Planner)</title>
    <style>
        :root { --safe: #2ecc71; --danger: #e74c3c; --accent: #f1c40f; --bg: #121212; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 300px; background: #222; padding: 20px; border-right: 2px solid #000; overflow-y: auto; }
        .ac-item { background: #34495e; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: grab; text-align: center; border: 1px solid transparent; }
        .ac-item:hover { background: #5d6d7e; border-color: white; }

        /* Viewport */
        #viewport { flex-grow: 1; overflow: auto; background: #111; position: relative; }
        svg { background: #1a1a1a; min-width: 5000px; height: 100%; }

        /* SVG Components */
        .headerline { stroke: white; stroke-width: 4; }
        .t-mark { fill: var(--accent); cursor: pointer; transition: 0.2s; }
        .t-mark:hover { fill: #fff; r: 10; }
        .t-text { fill: var(--accent); font-size: 11px; font-weight: bold; }
        
        .stand-box { fill: rgba(255,255,255,0.02); stroke: #444; stroke-width: 1; }
        .stand-parent { stroke: #f1c40f; stroke-dasharray: 8,4; stroke-width: 1.5; }
        
        .swing-path { fill: none; stroke-width: 3; }
        .safe { stroke: var(--safe); }
        .unsafe { stroke: var(--danger); }
        
        .ac-body { fill: #fff; stroke: #333; cursor: move; }
        .ac-wing { fill: #bdc3c7; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="color: var(--safe)">✈️ คลังเครื่องบิน</h3>
    <div id="aircraft-list">โหลดข้อมูลเครื่องบิน...</div>
    <hr style="border: 0.5px solid #444; margin: 20px 0;">
    <div style="font-size: 0.8em; color: #aaa; line-height: 1.6;">
        <b>คู่มือ:</b><br>
        1. ลากเครื่องบินไปวางที่จุด <span style="color:var(--accent)">●</span> T1 หรือ T2<br>
        2. คลิกที่ตัวเครื่องเพื่อเปลี่ยนโหมดเลี้ยว (ซ้าย/ขวา/ทั้งคู่)<br>
        3. ดับเบิลคลิกเพื่อลบเครื่องบินออก
    </div>
</div>

<div id="viewport">
    <div id="status" style="position: absolute; top:10px; left:20px; font-size:12px;">🛰️ กำลังเชื่อมต่อ GS...</div>
    <svg id="apron-svg">
        <defs>
            <marker id="arrow-safe" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
            <marker id="arrow-danger" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
        </defs>
        <g id="main-layer"></g>
    </svg>
</div>

<script>
    // *** เปลี่ยน URL ของคุณที่นี่ ***
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";

    let db = { aircrafts: [], stands: [] };
    let allocations = []; // { standId, model, tMark, mode: 0 } 
    const SCALE = 4; // 1 เมตร = 4 พิกเซล
    const HEADER_Y = 150;

    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            document.getElementById('status').innerHTML = "🟢 ฐานข้อมูลออนไลน์";
            renderList();
            draw();
        } catch (e) {
            document.getElementById('status').innerHTML = "🔴 เชื่อมต่อล้มเหลว";
        }
    }

    function renderList() {
        const list = document.getElementById('aircraft-list');
        list.innerHTML = '';
        db.aircrafts.forEach(ac => {
            const div = document.createElement('div');
            div.className = 'ac-item';
            div.draggable = true;
            div.innerText = ac.Model;
            div.ondragstart = (e) => e.dataTransfer.setData("text", ac.Model);
            list.appendChild(div);
        });
    }

    function draw() {
        const layer = document.getElementById('main-layer');
        layer.innerHTML = '';
        let xPosMap = {};
        let currentX = 100;

        // 1. วาดหลุมจอด
        db.stands.forEach(st => {
            const standW = st.Width * SCALE;
            const standL = st.Length * SCALE;
            
            let centerX;
            if (st.ParentID) {
                // หลุมย่อย (Child) คำนวณจากกึ่งกลาง Parent + Offset (20.5m)
                centerX = xPosMap[st.ParentID] + (st.OffsetX * SCALE);
            } else {
                centerX = currentX + (standW / 2);
                xPosMap[st.StandID] = centerX;
            }
            xPosMap[st.StandID] = centerX;

            // วาดกรอบหลุมจอด
            layer.innerHTML += `<rect x="${centerX - standW/2}" y="${HEADER_Y}" width="${standW}" height="${standL}" class="stand-box ${st.ParentID ? '' : 'stand-parent'}" ondragover="event.preventDefault()" />`;
            layer.innerHTML += `<line x1="${centerX - standW/2}" y1="${HEADER_Y}" x2="${centerX + standW/2}" y2="${HEADER_Y}" class="headerline" />`;
            
            // วาด T-Marks (T1 @ 12.5m, T2 @ 30m)
            const t1Y = HEADER_Y + (12.5 * SCALE);
            const t2Y = HEADER_Y + (30.0 * SCALE);
            drawTMark(layer, centerX, t1Y, "T1", st.StandID);
            drawTMark(layer, centerX, t2Y, "T2", st.StandID);
            
            layer.innerHTML += `<text x="${centerX}" y="${HEADER_Y + standL + 25}" fill="#888" text-anchor="middle" font-size="12">${st.StandID}</text>`;
            if (!st.ParentID) currentX += standW + (5 * SCALE);
        });

        // 2. วาดเครื่องบิน
        allocations.forEach((alloc, idx) => {
            const ac = db.aircrafts.find(a => a.Model === alloc.model);
            const centerX = xPosMap[alloc.standId];
            const noseY = HEADER_Y + (alloc.tMark === 'T1' ? 12.5 : 30) * SCALE;
            const pivotY = noseY + (ac.NoseToPivot * SCALE); // จุดหมุน (ล้อหลัง)

            // ตรวจสอบความปลอดภัย (Conflict)
            const conflictL = checkSafety(alloc, 'Left', xPosMap);
            const conflictR = checkSafety(alloc, 'Right', xPosMap);

            // วาด Arc เลี้ยว (กวาดไปด้านหน้า)
            if (alloc.mode === 0 || alloc.mode === 1) drawSwing(layer, centerX, pivotY, ac, true, conflictL);
            if (alloc.mode === 0 || alloc.mode === 2) drawSwing(layer, centerX, pivotY, ac, false, conflictR);

            // วาด Model เครื่องบิน
            const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
            group.setAttribute("transform", `translate(${centerX}, ${noseY})`);
            group.onclick = () => { allocations[idx].mode = (alloc.mode + 1) % 3; draw(); };
            group.ondblclick = () => { allocations.splice(idx, 1); draw(); };

            group.innerHTML = `
                <path d="M 0,${ac.NoseToPivot*SCALE} L ${-ac.Span*SCALE/2},${(ac.NoseToPivot+3)*SCALE} L ${ac.Span*SCALE/2},${(ac.NoseToPivot+3)*SCALE} Z" class="ac-wing" />
                <rect x="${-ac.Span*SCALE/16}" y="0" width="${ac.Span*SCALE/8}" height="${ac.Length*SCALE}" rx="8" fill="white" stroke="#333" />
                <circle cx="0" cy="0" r="4" fill="red" /> <!-- Nose Gear -->
                <text y="-10" fill="yellow" text-anchor="middle" font-size="12" font-weight="bold">${ac.Model}</text>
            `;
            layer.appendChild(group);
        });
    }

    function drawTMark(layer, x, y, label, standId) {
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 7); c.setAttribute("class", "t-mark");
        c.ondrop = (e) => {
            e.preventDefault();
            const model = e.dataTransfer.getData("text");
            // ล็อกหลุม MARS
            const st = db.stands.find(s => s.StandID === standId);
            allocations = allocations.filter(a => a.standId !== standId);
            if (st.ParentID) allocations = allocations.filter(a => a.standId !== st.ParentID);
            else allocations = allocations.filter(a => db.stands.find(s => s.StandID === a.standId).ParentID !== standId);

            allocations.push({ standId, model, tMark: label, mode: 0 });
            draw();
        };
        layer.appendChild(c);
        layer.innerHTML += `<text x="${x+15}" y="${y+5}" class="t-text">${label}</text>`;
    }

    function drawSwing(layer, cx, py, ac, isLeft, isDanger) {
        const r = ac.SweepRadius * SCALE;
        const pivotX = isLeft ? cx + (ac.PivotOffset * SCALE) : cx - (ac.PivotOffset * SCALE);
        const marker = isDanger ? 'url(#arrow-danger)' : 'url(#arrow-safe)';
        
        // วาดจากแนวปีก (ล่าง) ขึ้นไปด้านหน้า (บน)
        const startX = pivotX + (isLeft ? -r : r);
        const endX = pivotX;
        const endY = py - r;

        const d = `M ${startX} ${py} A ${r} ${r} 0 0 ${isLeft ? 1 : 0} ${endX} ${endY}`;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute("d", d);
        p.setAttribute("class", `swing-path ${isDanger ? 'unsafe' : 'safe'}`);
        p.setAttribute("style", `marker-end: ${marker}`);
        layer.appendChild(p);
    }

    function checkSafety(alloc, side, xPosMap) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const myX = xPosMap[alloc.standId];
        const reach = ac.PivotOffset + ac.SweepRadius;

        return allocations.some(other => {
            if (other === alloc) return false;
            const oAc = db.aircrafts.find(a => a.Model === other.model);
            const oX = xPosMap[other.standId];
            const dist = Math.abs(myX - oX) / SCALE;
            
            const isCorrectSide = (side === 'Left' && oX < myX) || (side === 'Right' && oX > myX);
            if (isCorrectSide && (reach + (oAc.Span / 2) > dist)) return true;
            return false;
        });
    }

    init();
</script>
</body>
</html>
