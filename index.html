<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Stand Planner Pro v10 - Fixed Logic</title>
    <style>
        :root { --safe: #2ecc71; --danger: #e74c3c; --accent: #f1c40f; --bg: #111; --panel: #222; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* Top Navigation */
        #top-bar { height: 110px; background: var(--panel); border-bottom: 2px solid #333; padding: 10px 20px; display: flex; gap: 15px; align-items: center; z-index: 1000; }
        .ac-list-container { display: flex; gap: 8px; overflow-x: auto; flex-grow: 1; }
        .ac-item { min-width: 130px; background: #34495e; padding: 12px; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; border: 2px solid transparent; font-size: 0.9rem; transition: 0.2s; }
        .ac-item.selected { background: var(--accent); color: #000; }
        
        .tool-box { background: #2c3e50; padding: 10px; border-radius: 8px; font-size: 0.85rem; min-width: 350px; }
        .config-box { min-width: 220px; background: #2c3e50; padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent); }

        /* Main Viewport */
        #viewport { flex-grow: 1; overflow: auto; background: #000; position: relative; }
        svg { background: #111; min-width: 5000px; height: 100%; cursor: crosshair; }

        /* SVG Components */
        .stand-box { fill: rgba(255,255,255,0.01); stroke: #444; stroke-width: 1; }
        .no-go-line { stroke: var(--danger); stroke-width: 1.5; stroke-dasharray: 5; fill: none; pointer-events: none; }
        .t-mark { fill: var(--accent); opacity: 0.6; cursor: pointer; }

        .swing-path { fill: rgba(255, 255, 255, 0.05); stroke-width: 3; pointer-events: none; }
        .safe { stroke: var(--safe); }
        .unsafe { stroke: var(--danger); }
        
        .wing-gap-line { stroke: #3498db; stroke-width: 2; stroke-dasharray: 5; pointer-events: none; }
        .wing-gap-text { fill: #ffffff; font-size: 14px; font-weight: bold; paint-order: stroke; stroke: #000; stroke-width: 3px; pointer-events: none; }

        .ac-group { cursor: pointer; }
        .ac-body { fill: #fff; stroke: #333; }
        .active-ac .ac-body { stroke: var(--accent); stroke-width: 3; filter: drop-shadow(0 0 5px var(--accent)); }
        .ac-wing { fill: #ffffff !important; stroke: #333; }
        .pivot-dot { fill: #ff4757; r: 5; pointer-events: none; }

        /* Floating Audit Panel */
        #audit-float { 
            position: fixed; top: 130px; right: 20px; width: 450px; 
            background: rgba(25, 25, 25, 0.95); border: 2px solid #444; 
            border-radius: 12px; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: none;
        }
        .audit-card { line-height: 1.6; font-size: 0.95rem; padding: 15px; max-height: 70vh; overflow-y: auto; }
        .formula { color: var(--accent); font-family: monospace; display: block; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; margin: 8px 0; }
        #ghost-group { pointer-events: none; display: none; opacity: 0.4; }

        /* สีของ Jet Blast (ส้ม-เหลืองจางๆ) */
.jetblast-zone {
    fill: url(#jetblastGradient);
    stroke: orange;
    stroke-width: 1;
    stroke-dasharray: 4;
    opacity: 0.4;
    pointer-events: none;
}
.jetblast-danger {
    fill: rgba(255, 69, 0, 0.4) !important;
    stroke: red !important;
}
    </style>
</head>
<body>

<header id="top-bar">
    <div class="tool-box">
        🎯 <b>โหมด:</b> 
        <select id="place-mode" style="background:#444; color:white; border:none; padding:5px; border-radius:4px;">
            <option value="snap">Snap T-Mark</option>
            <option value="free">อิสระ (Parallel)</option>
        </select>
        &nbsp;&nbsp; 🔄 <b>Rotation:</b> 
        <input type="number" id="ac-rot-num" value="0" style="width:50px; background:#444; color:var(--accent); border:1px solid #666;" oninput="syncRot(this.value, 'slider')">
        <input type="range" id="ac-rot-slider" min="0" max="360" value="0" style="width:100px" oninput="syncRot(this.value, 'input')">
    </div>
    <div class="config-box">
        <label>📏 Safety Margin เพิ่มเติม:</label><br>
        <input type="number" id="extra-margin" style="width:70px; padding:5px; margin-top:5px; background:#444; color:var(--accent); border:1px solid #666;" value="0" oninput="draw()"> <b>เมตร</b>
    </div>
    <div class="ac-list-container" id="aircraft-list"></div>
    <button id="cancel-btn" onclick="cancelSelection()" style="display:none; padding:10px; background:var(--danger); border:none; color:white; border-radius:6px; cursor:pointer;">ยกเลิก</button>
</header>

<div id="viewport">
    <svg id="apron-svg" onmousemove="moveGhost(event)" onclick="handleSvgClick(event)">
        <defs>
            <marker id="arrow-safe" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
            <marker id="arrow-danger" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
            <linearGradient id="jetblastGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:orange; stop-opacity:1" />
        <stop offset="100%" style="stop-color:yellow; stop-opacity:0" />
    </linearGradient>
        </defs>
        <g id="bg-layer"></g>
        <g id="swing-layer"></g>
        <g id="ac-layer"></g>
        <g id="ghost-group">
            <path id="ghost-wing" fill="#ffffff" />
            <rect id="ghost-body" fill="#fff" rx="8" />
        </g>
    </svg>

    <!-- Floating Audit Panel -->
    <div id="audit-float">
        <div id="audit-drag-handle" style="background:var(--accent); color:black; padding:8px; font-weight:bold; border-radius:10px 10px 0 0; text-align:center; font-size:12px; cursor:move;">📊 รายละเอียดการคำนวณ (ลากย้ายได้)</div>
        <div id="audit-content" class="audit-card"></div>
        <button onclick="document.getElementById('audit-float').style.display='none'" style="width:100%; background:#444; color:white; border:none; padding:10px; border-radius:0 0 10px 10px; cursor:pointer;">ปิดหน้าต่างนี้</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";
    let db = { aircrafts: [], stands: [], clearanceRules: [] };
    let allocations = []; 
    let selectedAC = null, activeIdx = null, currentRotation = 0, xMap = {};
    const SCALE = 4, HEADER_Y = 100;

    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            renderList();
            draw();
            dragElement(document.getElementById("audit-float"));
        } catch (e) { alert("GS Connection Failed"); }
    }

    function renderList() {
        const list = document.getElementById('aircraft-list');
        list.innerHTML = '';
        db.aircrafts.forEach(ac => {
            const div = document.createElement('div');
            div.className = 'ac-item';
            div.innerText = ac.Model;
            div.onclick = (e) => {
                e.stopPropagation();
                selectAC(ac, div);
            };
            list.appendChild(div);
        });
    }

    function selectAC(ac, el) {
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        selectedAC = ac;
        document.getElementById('ghost-group').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';
        updateRotPreview(currentRotation);
    }

    function syncRot(val, target) {
        if (target === 'slider') document.getElementById('ac-rot-slider').value = val;
        else document.getElementById('ac-rot-num').value = val;
        updateRotPreview(val);
    }

    function updateRotPreview(val) {
        currentRotation = parseInt(val);
        const degSpan = document.getElementById('deg-val');
        if(degSpan) degSpan.innerText = val;
        if (!selectedAC) return;
        const span = selectedAC.Span * SCALE, n2p = selectedAC.NoseToPivot * SCALE, len = selectedAC.Length * SCALE;
        document.getElementById('ghost-wing').setAttribute("d", `M 0,${n2p} L ${-span/2},${n2p+10} L ${span/2},${n2p+10} Z`);
        document.getElementById('ghost-body').setAttribute("x", -span/16);
        document.getElementById('ghost-body').setAttribute("width", span/8);
        document.getElementById('ghost-body').setAttribute("height", len);
    }

    function moveGhost(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        document.getElementById('ghost-group').setAttribute("transform", `translate(${pt.x}, ${pt.y}) rotate(${currentRotation})`);
    }

    function getSvgPt(e) {
        const svg = document.getElementById('apron-svg');
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

  function handleSvgClick(e) {
    if (!selectedAC) return;
    const pt = getSvgPt(e);
    const mode = document.getElementById('place-mode').value;
    
    // ค้นหาหลุมที่จุดคลิกอยู่ภายในขอบเขต และเลือกหลุมที่คลิกใกล้จุดศูนย์กลางที่สุด
    let candidates = [];
    for (let st of db.stands) {
        const cx = xMap[st.StandID], hw = (st.Width * SCALE) / 2;
        if (pt.x >= cx - hw && pt.x <= cx + hw) {
            candidates.push({ id: st.StandID, dist: Math.abs(pt.x - cx), stand: st });
        }
    }

    if (candidates.length > 0) {
        // เลือกหลุมที่ใกล้จุดศูนย์กลางที่สุด (ป้องกันปัญหาหลุมซ้อน 8, 8L, 8R)
        const bestCandidate = candidates.sort((a, b) => a.dist - b.dist)[0];
        const bestSt = bestCandidate.id;
        const st = bestCandidate.stand;
        let snapX = pt.x, snapY = pt.y;
        const cx = xMap[bestSt];

        if (mode === 'snap') {
            const t1 = HEADER_Y + (12.5 * SCALE), t2 = HEADER_Y + (30 * SCALE);
            snapY = Math.abs(pt.y - t1) < Math.abs(pt.y - t2) ? t1 : t2;
            snapX = cx;
        }

        const minY = HEADER_Y + (12.5 * SCALE), maxY = HEADER_Y + (st.Length - 12.5) * SCALE;
        if (snapY < minY || snapY > maxY) { alert("อยู่นอกเขตปลอดภัย (12.5ม.)"); return; }

        const newAlloc = { 
            id: Date.now(), standId: bestSt, model: selectedAC.Model, 
            x: snapX, y: snapY, rotation: currentRotation, turnMode: 0 
        };
        allocations.push(newAlloc);
        activeIdx = allocations.length - 1;
        cancelSelection();
        draw();
    }
}
// ฟังก์ชันหาว่าจุดเป้าหมาย อยู่ทาง "ซ้าย" หรือ "ขวา" ของเครื่องบิน (อิงตามการหมุน)
function getRelativeSide(subject, target) {
    const dx = target.x - subject.x;
    const dy = target.y - subject.y;
    // หมุนพิกัดตามองศาเครื่องบิน (subject.rotation)
    const angle = -subject.rotation * Math.PI / 180;
    const localX = dx * Math.cos(angle) - dy * Math.sin(angle);
    
    // ถ้า localX เป็นลบ คืออยู่ทางซ้ายของนักบิน | เป็นบวก คืออยู่ทางขวา
    return localX < 0 ? "Left" : "Right";
}
// ฟังก์ชันช่วยตรวจสอบการชนของ Jet Blast
function checkJetConflict(alloc, idx) {
    const ac = db.aircrafts.find(a => a.Model === alloc.model);
    const jetRange = ac.JetBlast || 0;
    if (jetRange === 0) return false;

    return allocations.some((other, otIdx) => {
        if (idx === otIdx) return false;
        
        // คำนวณพิกัดท้ายเครื่อง
        const rad = (alloc.rotation - 90) * Math.PI / 180;
        const tailX = alloc.x - Math.cos(rad) * (ac.Length * SCALE);
        const tailY = alloc.y - Math.sin(rad) * (ac.Length * SCALE);
        
        // ระยะห่างจากท้ายเครื่องเราไปที่จุดศูนย์กลางเครื่องข้างๆ
        const dist = Math.sqrt(Math.pow(tailX - other.x, 2) + Math.pow(tailY - other.y, 2)) / SCALE;
        return dist < jetRange;
    });
}
function draw() {
    const bg = document.getElementById('bg-layer');
    const sw = document.getElementById('swing-layer');
    const acL = document.getElementById('ac-layer');
    bg.innerHTML = ''; sw.innerHTML = ''; acL.innerHTML = '';

    let curX = 50; xMap = {};
    const extraMargin = parseFloat(document.getElementById('extra-margin').value) || 0;

    // 1. วาดผังหลุมจอด (Stand Layout)
    db.stands.forEach(st => {
        const w = st.Width * SCALE, l = st.Length * SCALE;
        // คำนวณตำแหน่ง X ของหลุม (รองรับหลุมย่อย L/R)
        let cx = (st.ParentID && xMap[st.ParentID]) ? xMap[st.ParentID] + (st.OffsetX * SCALE) : (curX + w/2);
        xMap[st.StandID] = cx;
        if (!st.ParentID) curX += w;

        // วาดกรอบหลุมและเส้น No-go
        bg.innerHTML += `<rect x="${cx-w/2}" y="${HEADER_Y}" width="${w}" height="${l}" class="stand-box" />`;
        bg.innerHTML += `<rect x="${cx-w/2}" y="${HEADER_Y + (12.5*SCALE)}" width="${w}" height="${l - (25*SCALE)}" class="no-go-line" />`;
        
        // วาดจุด T-Mark (T1, T2)
        bg.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 12.5*SCALE}" r="6" class="t-mark" />`;
        bg.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 30.0*SCALE}" r="6" class="t-mark" />`;
        
        // แสดงชื่อหลุมและขนาด (Width x Length)
        bg.innerHTML += `<text x="${cx}" y="${HEADER_Y + l + 20}" fill="#fff" text-anchor="middle" font-size="12" font-weight="bold" pointer-events="none">${st.StandID}</text>`;
        bg.innerHTML += `<text x="${cx}" y="${HEADER_Y + l + 38}" fill="#888" text-anchor="middle" font-size="11" pointer-events="none">${st.Width} x ${st.Length} m</text>`;
    });

    // 2. วาดเครื่องบินและระบบคำนวณความปลอดภัย
    allocations.forEach((alloc, idx) => {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        if (!ac) return;

        // --- คำนวณพิกัดจุดหมุน (Actual Pivot Point) ตามการหมุนของเครื่อง ---
        const rad = (alloc.rotation - 90) * Math.PI / 180; // มุมหน้าเครื่อง
        const pDist = ac.NoseToPivot * SCALE;
        const pOff = ac.PivotOffset * SCALE;

        // หาตำแหน่งกึ่งกลางล้อหลัก (Main Gear Center)
        const mgcX = alloc.x - Math.cos(rad) * pDist;
        const mgcY = alloc.y - Math.sin(rad) * pDist;

        // หาพิกัดจุดหมุนจริง (Pivot) ตาม Mode: 0=ล้อขวา, 1=ล้อซ้าย
        const pivotAngle = rad + (alloc.turnMode === 0 ? Math.PI/2 : -Math.PI/2);
        const actualPivotX = mgcX + Math.cos(pivotAngle) * pOff;
        const actualPivotY = mgcY + Math.sin(pivotAngle) * pOff;

        // --- การตรวจสอบความปลอดภัย (Collision Detection) ---
        const isWingDanger = checkCollision(alloc, idx, extraMargin);
        const jetStatus = getJetSafetyData(alloc, idx);

        // --- วาดรัศมีการกวาดปีก (Wing Sweep Arc) ---
        const r = (ac.SweepRadius + extraMargin) * SCALE;
        drawArc(sw, actualPivotX, actualPivotY, r, alloc.turnMode === 0, isWingDanger, alloc.rotation);

        // --- วาดรัศมี Jet Blast (ถ้ามีข้อมูล) ---
        if (ac.JetBlast > 0) {
            drawJetBlastArc(sw, actualPivotX, actualPivotY, ac, alloc.turnMode === 0, jetStatus.isDanger, alloc.rotation);
        }

        // --- วาดตัวเครื่องบิน ---
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("transform", `translate(${alloc.x}, ${alloc.y}) rotate(${alloc.rotation})`);
        g.setAttribute("class", `ac-group ${activeIdx === idx ? 'active-ac' : ''}`);
        
        const span = ac.Span * SCALE;
        const len = ac.Length * SCALE;
        
        g.innerHTML = `
            <!-- ปีกเครื่องบิน -->
            <path d="M 0,${pDist} L ${-span/2},${pDist+10} L ${span/2},${pDist+10} Z" class="ac-wing" />
            <!-- ลำตัวเครื่องบิน -->
            <rect x="${-span/16}" y="0" width="${span/8}" height="${len}" rx="8" class="ac-body" />
            <!-- จุดล้อหน้า -->
            <circle cx="0" cy="0" r="4" fill="red" />
            <!-- จุดล้อหลักและจุดหมุน -->
            <circle cx="${pOff}" cy="${pDist}" r="3" fill="#555" />
            <circle cx="${-pOff}" cy="${pDist}" r="3" fill="#555" />
            <circle cx="${alloc.turnMode === 0 ? pOff : -pOff}" cy="${pDist}" r="5" fill="#ff4757" />
        `;

        // Events
        g.onclick = (e) => { 
            e.stopPropagation(); 
            activeIdx = idx;
            alloc.turnMode = 1 - alloc.turnMode; // สลับทิศทางเลี้ยว
            draw(); 
        };
        g.ondblclick = (e) => { 
            e.stopPropagation(); 
            allocations.splice(idx, 1); 
            activeIdx = null; 
            draw(); 
        };
        acL.appendChild(g);

        // วาดเส้นระยะห่างปลายปีก (Wingtip Gap)
        drawSpecificGap(sw, alloc, idx);
    });

    // อัปเดตแผงควบคุม (Audit Panel) หากมีการเลือกเครื่องอยู่
    if (activeIdx !== null && allocations[activeIdx]) {
        updateAudit(allocations[activeIdx], activeIdx);
    }
}

   // ฟังก์ชันวาดพื้นที่กวาดของแรงลม (Swept Jet Blast Zone)
// แก้ไขฟังก์ชันวาด Jet Blast ให้เหวี่ยงสลับข้างกับการเลี้ยว
function drawJetBlastArc(layer, px, py, ac, isNoseRight, isDanger, rot) {
    const jetRange = (ac.JetBlast || 0) * SCALE;
    const tailDist = (ac.Length - ac.NoseToPivot) * SCALE; 
    const innerR = tailDist; 
    const outerR = tailDist + jetRange;
    
    // มุมหัวเครื่อง (Radian)
    const baseRad = (rot - 90) * Math.PI / 180;
    // ทิศท้ายเครื่อง (ตรงข้ามหัวเครื่อง 180 องศา)
    const backAngle = baseRad + Math.PI;

    const angleDiff = Math.PI / 2; // กวาดไป 90 องศา
    let endAngle, sweepFlag;

    if (isNoseRight) {
        // --- เลี้ยวขวา (Mode 0) -> ท้ายเครื่องเหวี่ยงไป "ซ้าย" ---
        // ในระบบ SVG การเพิ่มมุม (+) คือการกวาดตามเข็มนาฬิกาไปทางซ้ายของเครื่อง
        endAngle = backAngle + angleDiff; 
        sweepFlag = 1; 
    } else {
        // --- เลี้ยวซ้าย (Mode 1) -> ท้ายเครื่องเหวี่ยงไป "ขวา" ---
        // การลดมุม (-) คือการกวาดทวนเข็มนาฬิกาไปทางขวาของเครื่อง
        endAngle = backAngle - angleDiff;
        sweepFlag = 0;
    }

    const getPt = (r, ang) => ({
        x: px + Math.cos(ang) * r,
        y: py + Math.sin(ang) * r
    });

    const p1i = getPt(innerR, backAngle);
    const p2i = getPt(innerR, endAngle);
    const p1o = getPt(outerR, backAngle);
    const p2o = getPt(outerR, endAngle);

    // วาดรูปเสี้ยววงแหวน (Annular Sector)
    // sweep-flag ของวงนอกต้องตรงข้ามกับวงในเสมอเพื่อปิด Loop ให้ถูกต้อง
    const d = `
        M ${p1i.x} ${p1i.y} 
        A ${innerR} ${innerR} 0 0 ${sweepFlag} ${p2i.x} ${p2i.y}
        L ${p2o.x} ${p2o.y}
        A ${outerR} ${outerR} 0 0 ${1 - sweepFlag} ${p1o.x} ${p1o.y}
        Z
    `;

    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", d);
    
    const color = isDanger ? 'rgba(231, 76, 60, 0.4)' : 'rgba(46, 204, 113, 0.2)';
    const stroke = isDanger ? '#e74c3c' : '#2ecc71';
    
    p.setAttribute("style", `fill: ${color}; stroke: ${stroke}; stroke-width: 1.5; stroke-dasharray: 4; pointer-events: none;`);
    layer.appendChild(p);
}

function getJetSafetyData(alloc, idx) {
    const ac = db.aircrafts.find(a => a.Model === alloc.model);
    if (!ac || !ac.JetBlast) return { isDanger: false, gap: null, side: null };

    const tailDist = ac.Length - ac.NoseToPivot;
    const maxSafeR = tailDist + ac.JetBlast;
    let minGap = Infinity;
    let targetFound = false;

    // หาจุดหมุน (Pivot)
    const pOff = ac.PivotOffset * SCALE;
    const rad = (alloc.rotation - 90) * Math.PI / 180;
    const pivotX = alloc.x + Math.cos(rad + (alloc.turnMode === 0 ? Math.PI/2 : -Math.PI/2)) * pOff;
    const pivotY = alloc.y + Math.sin(rad + (alloc.turnMode === 0 ? Math.PI/2 : -Math.PI/2)) * pOff;

    allocations.forEach((other, otIdx) => {
        if (idx === otIdx) return;
        const acOther = db.aircrafts.find(o => o.Model === other.model);
        
        // ตรวจสอบว่าเครื่องลำอื่น อยู่ฝั่งที่ท้ายเครื่องเหวี่ยงไปหรือไม่
        const side = getRelativeSide(alloc, other);
        const tailSwingsTo = (alloc.turnMode === 0) ? "Left" : "Right";

        if (side === tailSwingsTo) {
            const dist = Math.sqrt(Math.pow(pivotX - other.x, 2) + Math.pow(pivotY - other.y, 2)) / SCALE;
            const currentGap = dist - (maxSafeR + (acOther.Span / 2));
            if (currentGap < minGap) {
                minGap = currentGap;
                targetFound = true;
            }
        }
    });

    return { 
        isDanger: targetFound && minGap < 0, 
        gap: targetFound ? minGap : null,
        tailSide: (alloc.turnMode === 0) ? "ซ้าย ⬅️" : "ขวา ➡️"
    };
}
    
function checkDynamicJetConflict(alloc, idx) {
    const ac = db.aircrafts.find(a => a.Model === alloc.model);
    const jetRange = ac.JetBlast || 0;
    const tailDist = ac.Length - ac.NoseToPivot;
    const maxSafeR = tailDist + jetRange;

    return allocations.some((other, otIdx) => {
        if (idx === otIdx) return false;
        
        const acOther = db.aircrafts.find(o => o.Model === other.model);
        const pDist = ac.NoseToPivot * SCALE, pOff = ac.PivotOffset * SCALE;
        // จุดหมุน (Pivot): เลี้ยวขวาใช้ล้อขวา / เลี้ยวซ้ายใช้ล้อซ้าย
        const pivotX = (alloc.turnMode === 0) ? alloc.x + pOff : alloc.x - pOff;
        const mlgY = alloc.y + pDist;

        const distToNeighbor = Math.sqrt(Math.pow(pivotX - other.x, 2) + Math.pow(mlgY - other.y, 2)) / SCALE;

        // เช็คว่าระยะห่างอยู่ในรัศมีลมกวาดหรือไม่ (บวกระยะครึ่งปีกเครื่องข้างๆ)
        const isWithinRange = distToNeighbor < (maxSafeR + acOther.Span/2);
        
        // --- เช็คฝั่งที่ถูกต้อง ---
        // เลี้ยวขวา (0) ท้ายไปซ้าย -> เช็คเครื่องฝั่งซ้าย (other.x < alloc.x)
        // เลี้ยวซ้าย (1) ท้ายไปขวา -> เช็คเครื่องฝั่งขวา (other.x > alloc.x)
        const isCorrectSide = (alloc.turnMode === 0 && other.x < alloc.x) || (alloc.turnMode === 1 && other.x > alloc.x);

        return isWithinRange && isCorrectSide;
    });
}

   function drawArc(layer, px, py, r, isRightTurn, isDanger, rot) {
    const marker = isDanger ? 'url(#arrow-danger)' : 'url(#arrow-safe)';
    
    // แปลงมุมเครื่องบิน (rot 0 คือหัวขึ้น = -90 องศาใน SVG)
    const baseRad = (rot - 90) * Math.PI / 180;

    let startAngle, endAngle, sweepFlag;

    if (isRightTurn) {
        // --- เลี้ยวขวา (Pivot ขวา) -> ปีกซ้ายเหวี่ยง ---
        // เริ่มจากปีกซ้าย (base - 90องศา) กวาดไปหาปีกขวา (base + 90องศา)
        startAngle = baseRad - Math.PI / 2;
        endAngle = baseRad + Math.PI / 2;
        sweepFlag = 1; // ตามเข็ม
    } else {
        // --- เลี้ยวซ้าย (Pivot ซ้าย) -> ปีกขวาเหวี่ยง ---
        // เริ่มจากปีกขวา (base + 90องศา) กวาดไปหาปีกซ้าย (base - 90องศา)
        startAngle = baseRad + Math.PI / 2;
        endAngle = baseRad - Math.PI / 2;
        sweepFlag = 0; // ทวนเข็ม
    }

    const startX = px + Math.cos(startAngle) * r;
    const startY = py + Math.sin(startAngle) * r;
    const endX = px + Math.cos(endAngle) * r;
    const endY = py + Math.sin(endAngle) * r;

    const d = `M ${startX} ${startY} A ${r} ${r} 0 0 ${sweepFlag} ${endX} ${endY}`;
    
    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", d);
    p.setAttribute("class", `swing-path ${isDanger ? 'unsafe' : 'safe'}`);
    p.setAttribute("style", `marker-end: ${marker}; fill: none; stroke-width: 3.5px;`);
    layer.appendChild(p);
}

    function drawSpecificGap(layer, alloc, idx) {
    // 1. นำเครื่องบินทุกลำมาเรียงลำดับตามพิกัด X (ซ้ายไปขวา)
    const sortedAlloc = [...allocations].sort((a, b) => a.x - b.x);
    
    // 2. หา Index ของเครื่องปัจจุบันในรายการที่เรียงแล้ว
    const currentSortedIdx = sortedAlloc.findIndex(a => a.id === alloc.id);
    
    // 3. วาดเส้นเชื่อมเฉพาะกับเครื่องที่อยู่ "ถัดไปทางขวา" 1 ลำ (ถ้ามี)
    if (currentSortedIdx < sortedAlloc.length - 1) {
        const other = sortedAlloc[currentSortedIdx + 1];
        const myAc = db.aircrafts.find(a => a.Model === alloc.model);
        const otAc = db.aircrafts.find(a => a.Model === other.model);

        // คำนวณจุดปลายปีก (ปีกขวาของเรา -> ปีกซ้ายของเขา)
        const x1 = alloc.x + (myAc.Span * SCALE / 2);
        const x2 = other.x - (otAc.Span * SCALE / 2);
        const y1 = alloc.y + (myAc.NoseToPivot * SCALE);
        const y2 = other.y + (otAc.NoseToPivot * SCALE);

        const gapVal = (x2 - x1) / SCALE;

        // วาดเส้นประสีฟ้า
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1); line.setAttribute("y1", y1);
        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
        line.setAttribute("class", "wing-gap-line");
        line.setAttribute("style", "stroke: #3498db; stroke-width: 2; stroke-dasharray: 5;");
        layer.appendChild(line);

        // วาดตัวเลขสีขาว
        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        txt.setAttribute("x", (x1 + x2) / 2);
        txt.setAttribute("y", (y1 + y2) / 2 - 10);
        txt.setAttribute("style", "fill: #ffffff; font-weight: bold; font-size: 14px; paint-order: stroke; stroke: #000; stroke-width: 2px;");
        txt.setAttribute("text-anchor", "middle");
        txt.textContent = gapVal.toFixed(2) + "m";
        layer.appendChild(txt);
    }
}

function checkCollision(alloc, idx, margin) {
    const ac = db.aircrafts.find(a => a.Model === alloc.model);
    
    // คำนวณพิกัดจุดหมุนเหมือนใน draw()
    const rad = (alloc.rotation - 90) * Math.PI / 180;
    const pDist = ac.NoseToPivot * SCALE;
    const pOff = ac.PivotOffset * SCALE;
    const mgcX = alloc.x - Math.cos(rad) * pDist;
    const mgcY = alloc.y - Math.sin(rad) * pDist;
    const pivotAngle = rad + (alloc.turnMode === 0 ? Math.PI/2 : -Math.PI/2);
    const pivotX = mgcX + Math.cos(pivotAngle) * pOff;
    const pivotY = mgcY + Math.sin(pivotAngle) * pOff;

    return allocations.some((other, otIdx) => {
        if (idx === otIdx) return false;
        const oAc = db.aircrafts.find(a => a.Model === other.model);

        // เครื่องที่เลี้ยว จะเช็คเฉพาะเครื่องฝั่งที่ปีกเหวี่ยงไป
        const sideOfNeighbor = getRelativeSide(alloc, other);
        const wingSwingSide = (alloc.turnMode === 0) ? "Left" : "Right";

        if (sideOfNeighbor === wingSwingSide) {
            // ระยะจากจุดหมุน ไปยังกึ่งกลางเครื่องข้างๆ
            const distPivotToOther = Math.sqrt(Math.pow(pivotX - other.x, 2) + Math.pow(pivotY - other.y, 2)) / SCALE;
            
            // ชนเมื่อ ระยะห่าง < (รัศมีกวาดปีกเรา + ครึ่งปีกเขา)
            return distPivotToOther < (ac.SweepRadius + margin + oAc.Span / 2);
        }
        return false;
    });
}
function updateAudit(alloc, idx) {
    if (!alloc) return;
    const ac = db.aircrafts.find(a => a.Model === alloc.model);
    const rule = db.clearanceRules.find(r => r.Code === ac.Code) || { MinClearance: 4.5 };
    const extraMargin = parseFloat(document.getElementById('extra-margin').value) || 0;
    const totalReach = ac.PivotOffset + ac.SweepRadius + extraMargin;

    // 1. บังคับแสดงพาแนลทุครั้งที่เรียก
    const float = document.getElementById('audit-float');
    float.style.display = 'block';

    // 2. ค้นหาเพื่อนบ้านซ้าย-ขวา
    let leftN = null, rightN = null;
    let minL = Infinity, minR = Infinity;
    
    // ค้นหาตำแหน่งล้อหลักจุดหมุน (PivotX) เพื่อใช้คำนวณระยะห่าง Jet Blast
    const pOff = ac.PivotOffset * SCALE;
    const pivotX = (alloc.turnMode === 0) ? alloc.x + pOff : alloc.x - pOff;

    allocations.forEach((other) => {
    if (other.id === alloc.id) return;
    const side = getRelativeSide(alloc, other);
    const d = Math.sqrt(Math.pow(alloc.x - other.x, 2) + Math.pow(alloc.y - other.y, 2)) / SCALE;
    
    if (side === "Left" && d < minL) { minL = d; leftN = other; }
    if (side === "Right" && d < minR) { minR = d; rightN = other; }
});
const totalReachFromCenter = ac.PivotOffset + ac.SweepRadius + extraMargin;
    let auditHTML = `
        <div style="border-bottom:1px solid #555; padding-bottom:10px; margin-bottom:15px;">
            <b style="font-size:1.3em; color:var(--accent);">📍 หลุม: ${alloc.standId}</b><br>
            <b>รุ่น:</b> ${ac.Model} (Type ${ac.Code}) | <b>หัวเครื่องเลี้ยว:</b> ${alloc.turnMode === 0 ? 'ขวา ➡️' : 'ซ้าย ⬅️'}
        </div>

        <div class="audit-card">
        <b>1. การคำนวณรัศมีกวาดปีก (Wing Sweep):</b>
        <span class="formula">R_Total = Pivot(${ac.PivotOffset}m) + R4(${ac.SweepRadius}m) + Extra(${extraMargin}m)</span>
        <b style="color:var(--accent);">ระยะเหวี่ยงสุทธิจากกึ่งกลาง = ${totalReachFromCenter.toFixed(2)} เมตร</b>
    </div>
    `;

    // ฟังก์ชันช่วยสร้าง HTML สำหรับเพื่อนบ้าน (คงเดิมตามที่คุณต้องการ)
    const getNeighborHTML = (neighbor, sideDist, label) => {
        if (!neighbor) return `<p style="color:#888; font-size:0.9em;">- ไม่พบอากาศยานฝั่ง${label}</p>`;
        const otAc = db.aircrafts.find(a => a.Model === neighbor.model);
        const neighborHalfSpan = otAc.Span / 2;
        
        const staticGap = sideDist - (ac.Span / 2 + neighborHalfSpan);
        const isToward = (alloc.turnMode === 0 && label === 'ขวา') || (alloc.turnMode === 1 && label === 'ซ้าย');
        
        let html = `<div style="margin-bottom:8px;"><b>ฝั่ง${label} (${neighbor.standId}):</b> ${neighbor.model}<br>`;
        html += `จอดนิ่ง (Static): <b style="color:${staticGap < rule.MinClearance ? 'red' : 'lime'}">${staticGap.toFixed(2)}m</b> (Req ${rule.MinClearance}m)<br>`;
        
        if (isToward) {
            const dynamicGap = sideDist - (totalReach + neighborHalfSpan);
            html += `<span class="formula" style="font-size:0.8em;">คำนวณ: ${sideDist.toFixed(2)} - (${totalReach.toFixed(2)} + ${neighborHalfSpan.toFixed(2)})</span>`;
            html += `ขณะเลี้ยว (Dynamic): <b style="color:${dynamicGap < 0 ? 'red' : 'lime'}">${dynamicGap.toFixed(2)}m</b>`;
        }
        return html + `</div>`;
    };

    auditHTML += `<div class="audit-card"><b>2. ตรวจสอบ Clearance รอบข้าง:</b>${getNeighborHTML(leftN, minL, 'ซ้าย')}${getNeighborHTML(rightN, minR, 'ขวา')}</div>`;

    // 3. ตรวจสอบ Jet Blast (แก้ไขทิศทางและสูตรคำนวณตามหลักการ)
    if (ac.JetBlast) {
        const jetStatus = getJetSafetyData(alloc, idx); 
        // Logic: หัวเลี้ยวขวา(0) -> ท้ายเหวี่ยงไปซ้าย | หัวเลี้ยวซ้าย(1) -> ท้ายเหวี่ยงไปขวา
        const tailSwingSide = alloc.turnMode === 0 ? "ซ้าย ⬅️" : "ขวา ➡️";
        const tailDist = ac.Length - ac.NoseToPivot; // ระยะหางเหวี่ยง (24.93 สำหรับ A320)
        const maxBlastReach = tailDist + ac.JetBlast; // รัศมีลมพ่นรวม

        auditHTML += `
            <div class="audit-card" style="border-left-color: ${jetStatus.isDanger ? 'red' : '#2ecc71'}">
                <b>3. ตรวจสอบ Jet Blast (แรงลมท้ายเครื่อง):</b><br>
                ทิศทางเหวี่ยงท้ายเครื่อง: <b style="color:var(--accent);">${tailSwingSide}</b><br>
                <span style="font-size:0.85em; color:#bbb;">(สูตร: ความยาว ${ac.Length}m - ฐานล้อ ${ac.NoseToPivot}m = ระยะท้ายเครื่อง ${tailDist.toFixed(2)}m)</span><br>
                <span class="formula">รัศมีลมพ่นสูงสุด (จากจุดหมุน): ${tailDist.toFixed(2)}m (ท้าย) + ${ac.JetBlast}m (ลม) = ${maxBlastReach.toFixed(2)}m</span>
                
                ${jetStatus.gap !== null ? 
                    `<span class="formula">คำนวณ: [ระยะจุดหมุนถึงลำข้างๆ] - [รัศมีลมพ่นสูงสุด + ครึ่งปีกข้างเคียง]</span>
                     <b style="color:${jetStatus.isDanger ? 'red' : 'lime'}; font-size:1.1em;">
                        คงเหลือระยะปลอดภัยสุทธิ: ${jetStatus.gap.toFixed(2)} เมตร
                     </b>` 
                    : `<i style="color:#aaa;">- ไม่พบอากาศยานในแนวเหวี่ยงของลม -</i>`
                }

                <div class="res-box" style="background:${jetStatus.isDanger ? 'rgba(231,76,60,0.2)' : 'rgba(46,204,113,0.2)'}; 
                                           color:${jetStatus.isDanger ? 'red' : '#2ecc71'}; 
                                           border-color:${jetStatus.isDanger ? 'red' : '#2ecc71'}; font-size:1rem; padding:8px; margin-top:10px;">
                    สถานะ Jet Blast: ${jetStatus.isDanger ? '❌ อันตราย! ลมเป่าลำข้างเคียง' : '✅ ระยะลมกวาดปลอดภัย'}
                </div>
            </div>
        `;
    }

    document.getElementById('audit-content').innerHTML = auditHTML;
}

    function cancelSelection() {
        selectedAC = null;
        document.getElementById('ghost-group').style.display = 'none';
        document.getElementById('cancel-btn').style.display = 'none';
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
    }

    function dragElement(elmnt) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const handle = document.getElementById("audit-drag-handle");
        if (handle) { handle.onmousedown = (e) => {
            e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            };
        }; }
    }

    init();
