<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Multi-Aircraft Stand Allocation & Swing-out Planner</title>
    <style>
        :root { --accent: #ff4757; --bg: #1e272e; --panel: #2f3542; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        
        #sidebar { width: 380px; background: var(--panel); padding: 20px; border-right: 2px solid #000; overflow-y: auto; }
        #viewport { flex-grow: 1; overflow: auto; background: #000; position: relative; }
        
        svg { background: #222; min-width: 2500px; height: 100%; }
        
        .stand-ctrl { background: #3e4451; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #747d8c; }
        .stand-ctrl.active { border-left-color: #2ed573; }
        
        select { width: 100%; padding: 10px; margin-top: 8px; border-radius: 4px; border: none; background: #57606f; color: white; }
        
        .stand-box { fill: #2c3e50; stroke: #555; stroke-width: 1; }
        .ac-fuselage { fill: #f1f2f6; stroke: #2f3542; }
        .ac-wing { fill: #ced6e0; stroke: #2f3542; }
        .swing-path { fill: rgba(255, 71, 87, 0.1); stroke: var(--accent); stroke-width: 2; stroke-dasharray: 8; }
        .collision { fill: rgba(255, 71, 87, 0.4) !important; stroke: #ff0000 !important; stroke-width: 4 !important; }
        
        .audit-card { background: white; color: #2f3542; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.9em; }
        .formula { font-family: monospace; color: #ff4757; display: block; margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Apron Manager</h2>
    <p id="status">Connecting...</p>
    <div id="controls"></div>
    <div id="audit"></div>
</div>

<div id="viewport">
    <svg id="apron-svg">
        <g id="grid-layer"></g>
        <g id="draw-layer"></g>
    </svg>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";
    let db = { aircrafts: [], stands: [] };
    let allocations = {}; // { StandID: ModelName }
    const SCALE = 4; // 1m = 4px

    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            document.getElementById('status').innerHTML = "🟢 Connected to Google Sheets";
            
            const ctrl = document.getElementById('controls');
            db.stands.forEach(st => {
                allocations[st.StandID] = "None";
                ctrl.innerHTML += `
                    <div class="stand-ctrl">
                        <label>Stand <strong>${st.StandID}</strong> (Width: ${st.Width}m)</label>
                        <select onchange="updateStand('${st.StandID}', this.value)">
                            <option value="None">-- Empty --</option>
                            ${db.aircrafts.map(ac => `<option value="${ac.Model}">${ac.Model}</option>`).join('')}
                        </select>
                    </div>
                `;
            });
            draw();
        } catch (e) { document.getElementById('status').innerHTML = "🔴 Connection Error"; }
    }

    function updateStand(id, model) {
        allocations[id] = model;
        draw();
    }

    function draw() {
        const layer = document.getElementById('draw-layer');
        layer.innerHTML = '';
        let currentX = 50;
        const centerY = 450;
        let auditHTML = "<h3>Audit Check</h3>";

        db.stands.forEach((stand, idx) => {
            const acModel = allocations[stand.StandID];
            const ac = db.aircrafts.find(a => a.Model === acModel);
            const standW = stand.Width * SCALE;
            const standL = stand.Length * SCALE;
            const centerX = currentX + (standW / 2);

            // วาดหลุมจอด
            layer.innerHTML += `
                <rect x="${currentX}" y="${centerY - standL}" width="${standW}" height="${standL}" class="stand-box" />
                <text x="${centerX}" y="${centerY + 30}" fill="#aaa" text-anchor="middle" font-size="14">${stand.StandID}</text>
            `;

            if (ac) {
                const pivotOffset = ac.PivotOffset * SCALE;
                const sweepR = ac.SweepRadius * SCALE;
                const totalReach = ac.PivotOffset + ac.SweepRadius; // ระยะเหวี่ยงจาก Centerline
                
                // ตรวจสอบการชนกับลำข้างๆ (Stand ชิดกันไม่มี Gap)
                let collision = false;
                
                // เช็คเพื่อนบ้านขวา
                if (idx < db.stands.length - 1) {
                    const nextSt = db.stands[idx+1];
                    const nextAc = db.aircrafts.find(a => a.Model === allocations[nextSt.StandID]);
                    if (nextAc) {
                        const requiredDist = totalReach + (nextAc.Span / 2);
                        if (requiredDist > stand.Width) collision = true;
                    }
                }
                
                // วาด Swing Arc (หมุนจากล้อหลัง)
                const pivotX = centerX - pivotOffset;
                layer.innerHTML += `
                    <path d="M ${pivotX + sweepR} ${centerY - 10} A ${sweepR} ${sweepR} 0 0 0 ${pivotX - sweepR} ${centerY - 10}" 
                          class="swing-path ${collision ? 'collision' : ''}" fill="none" />
                `;

                // วาดโมเดลเครื่องบิน Top-view
                drawACModel(layer, centerX, centerY, ac);

                if (collision) {
                    auditHTML += `<div style="color:red">⚠️ <strong>${stand.StandID}</strong>: Swing-out will hit aircraft in next stand!</div>`;
                }
            }
            currentX += standW;
        });
        document.getElementById('audit').innerHTML = auditHTML;
    }

    function drawACModel(layer, cx, cy, ac) {
        const s = SCALE;
        const span = ac.Span * s;
        const len = ac.Length * s;
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("transform", `translate(${cx}, ${cy - len/2})`);
        
        g.innerHTML = `
            <path d="M 0,${-len/4} L ${-span/2},${len/8} L ${span/2},${len/8} Z" class="ac-wing" />
            <rect x="${-span/16}" y="${-len/2}" width="${span/8}" height="${len}" rx="10" class="ac-fuselage" />
            <text y="${-len/2 - 10}" fill="yellow" text-anchor="middle" font-size="12">${ac.Model}</text>
        `;
        layer.appendChild(g);
    }

    init();
</script>
</body>
</html>
