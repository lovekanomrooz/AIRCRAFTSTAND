<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Stand Planner - Audit & Safety Pro</title>
    <style>
        :root { --safe: #2ecc71; --danger: #e74c3c; --accent: #f1c40f; --bg: #1a1a1a; --panel: #252525; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* Layout */
        #sidebar { width: 280px; background: var(--panel); padding: 20px; border-right: 2px solid #000; overflow-y: auto; z-index: 100; }
        #audit-panel { width: 340px; background: var(--panel); padding: 20px; border-left: 2px solid #000; overflow-y: auto; }
        #viewport { flex-grow: 1; overflow: auto; background: #111; position: relative; }
        svg { background: #151515; min-width: 5000px; height: 100%; }

        /* UI Elements */
        .ac-item { background: #34495e; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; border: 1px solid transparent; }
        .ac-item.selected { background: var(--accent); color: #000; }
        .input-box { background: #333; border: 1px solid #555; color: var(--accent); padding: 8px; width: 80%; border-radius: 4px; font-weight: bold; font-size: 1.1em; }
        
        /* SVG Component Styles */
        .stand-box { fill: rgba(255,255,255,0.02); stroke: #444; stroke-width: 1; }
        .headerline { stroke: white; stroke-width: 3; }
        .t-mark { fill: var(--accent); opacity: 0.6; pointer-events: none; }
        .swing-path { fill: rgba(255, 255, 255, 0.03); stroke-width: 3; pointer-events: none; } /* สำคัญ: pointer-events none */
        .safe { stroke: var(--safe); fill: rgba(46, 204, 113, 0.05); }
        .unsafe { stroke: var(--danger); fill: rgba(231, 76, 60, 0.15); }
        .ac-group { cursor: pointer; pointer-events: all; }
        .ac-body { fill: #fff; stroke: #333; }
        .ac-wing { fill: #bdc3c7; stroke: #333; }
        .pivot-dot { fill: #ff4757; r: 5; pointer-events: none; }

        /* Audit Card */
        .audit-card { background: #333; padding: 15px; border-radius: 8px; border-top: 5px solid var(--accent); line-height: 1.6; }
        .formula { font-family: monospace; color: var(--accent); display: block; margin: 5px 0; font-size: 0.95em; }
        .clearance-val { font-size: 1.2em; font-weight: bold; padding: 5px; border-radius: 4px; display: inline-block; }
        .val-safe { color: var(--safe); background: rgba(46, 204, 113, 0.1); }
        .val-danger { color: var(--danger); background: rgba(231, 76, 60, 0.1); }
        #status-bar { position: absolute; top: 10px; left: 300px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="color: var(--safe)">✈️ คลังเครื่องบิน</h3>
    <div id="aircraft-list">โหลดข้อมูล...</div>
    <hr style="border:0.5px solid #444; margin:20px 0;">
    
    <label>เพิ่มระยะปลอดภัย (Safety Margin):</label><br>
    <input type="number" id="extra-margin" class="input-box" value="0" min="0" oninput="draw()"> <span style="color:var(--accent)">เมตร</span>
    
    <hr style="border:0.5px solid #444; margin:20px 0;">
    <div style="font-size: 0.8em; color: #aaa;">
        <b>คำแนะนำ:</b><br>
        - คลิกเลือกเครื่องบิน -> คลิกวางที่จุด T1/T2<br>
        - คลิกที่เครื่องบินเพื่อดูระยะห่างจริง<br>
        - ดับเบิลคลิกเครื่องบินเพื่อลบออก
    </div>
</div>

<div id="viewport">
    <div id="status-bar">🛰️ กำลังเชื่อมต่อข้อมูล...</div>
    <svg id="apron-svg" onmousemove="moveGhost(event)" onclick="handleSvgClick(event)">
        <defs>
            <marker id="arrow-safe" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
            <marker id="arrow-danger" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
        </defs>
        <g id="main-layer"></g>
        <g id="ghost-group" style="display:none; pointer-events:none; opacity:0.3;">
            <path id="ghost-wing" d="" fill="#ced6e0" />
            <rect id="ghost-body" x="0" y="0" width="0" height="0" rx="8" fill="#fff" />
        </g>
    </svg>
</div>

<div id="audit-panel">
    <h3>🔍 การคำนวณระยะจริง</h3>
    <div id="audit-content">คลิกเครื่องบินบนลานจอดเพื่อเริ่มตรวจสอบ...</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";
    let db = { aircrafts: [], stands: [] };
    let allocations = []; 
    let selectedAC = null;
    const SCALE = 4; // 1m = 4px (1:25)
    const HEADER_Y = 150;

    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            document.getElementById('status-bar').innerHTML = "🟢 ฐานข้อมูลออนไลน์";
            renderList();
            draw();
        } catch (e) { document.getElementById('status-bar').innerHTML = "🔴 เชื่อมต่อฐานข้อมูลล้มเหลว"; }
    }

    function renderList() {
        const list = document.getElementById('aircraft-list');
        list.innerHTML = '';
        db.aircrafts.forEach(ac => {
            const div = document.createElement('div');
            div.className = 'ac-item';
            div.innerText = ac.Model;
            div.onclick = () => {
                document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                selectedAC = ac;
                document.getElementById('ghost-group').style.display = 'block';
                updateGhostVisual();
            };
            list.appendChild(div);
        });
    }

    function updateGhostVisual() {
        const span = selectedAC.Span * SCALE, n2p = selectedAC.NoseToPivot * SCALE;
        document.getElementById('ghost-wing').setAttribute("d", `M 0,${n2p} L ${-span/2},${n2p+10} L ${span/2},${n2p+10} Z`);
        document.getElementById('ghost-body').setAttribute("x", -span/16);
        document.getElementById('ghost-body').setAttribute("width", span/8);
        document.getElementById('ghost-body').setAttribute("height", selectedAC.Length * SCALE);
    }

    function moveGhost(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        document.getElementById('ghost-group').setAttribute("transform", `translate(${pt.x}, ${pt.y})`);
    }

    function getSvgPt(e) {
        const svg = document.getElementById('apron-svg');
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function handleSvgClick(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        let targetStand = null, snapY = pt.y, snapX = pt.x;

        db.stands.forEach(st => {
            const cx = getStandCenterX(st), hw = (st.Width * SCALE) / 2;
            if (pt.x >= cx - hw && pt.x <= cx + hw) {
                targetStand = st;
                const t1 = HEADER_Y + (12.5 * SCALE), t2 = HEADER_Y + (30.0 * SCALE);
                if (Math.abs(pt.y - t1) < 40) { snapY = t1; snapX = cx; }
                else if (Math.abs(pt.y - t2) < 40) { snapY = t2; snapX = cx; }
            }
        });

        if (targetStand) {
            allocations.push({ standId: targetStand.StandID, model: selectedAC.Model, x: snapX, y: snapY, turnMode: 0 });
            selectedAC = null;
            document.getElementById('ghost-group').style.display = 'none';
            document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
            draw();
        }
    }

    function getStandCenterX(st) {
        let curX = 100;
        for (let s of db.stands) {
            const w = s.Width * SCALE;
            const cx = s.ParentID ? getStandCenterX(db.stands.find(p => p.StandID === s.ParentID)) + (s.OffsetX * SCALE) : curX + (w / 2);
            if (s.StandID === st.StandID) return cx;
            if (!s.ParentID) curX += w;
        }
    }

    function draw() {
        const layer = document.getElementById('main-layer');
        layer.innerHTML = '';
        const extraMargin = parseFloat(document.getElementById('extra-margin').value) || 0;
        let xMap = {}, curX = 100;

        db.stands.forEach(st => {
            const sw = st.Width * SCALE, sl = st.Length * SCALE;
            let cx = st.ParentID ? xMap[st.ParentID] + (st.OffsetX * SCALE) : curX + (sw / 2);
            xMap[st.StandID] = cx;
            layer.innerHTML += `<rect x="${cx - sw/2}" y="${HEADER_Y}" width="${sw}" height="${sl}" class="stand-box" />`;
            layer.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 12.5*SCALE}" r="6" class="t-mark" />`;
            layer.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 30.0*SCALE}" r="6" class="t-mark" />`;
            layer.innerHTML += `<text x="${cx}" y="${HEADER_Y + sl + 20}" fill="#888" text-anchor="middle" font-size="11">${st.StandID}</text>`;
            if (!s.ParentID) curX += sw;
        });

        allocations.forEach((alloc, idx) => {
            const ac = db.aircrafts.find(a => a.Model === alloc.model);
            const span = ac.Span * SCALE, pDist = ac.NoseToPivot * SCALE, pOff = ac.PivotOffset * SCALE;
            const r = (ac.SweepRadius + extraMargin) * SCALE;
            const mlgY = alloc.y + pDist;

            const isDanger = checkConflict(alloc, idx, extraMargin);

            // Swing Path 180 Deg
            if (alloc.turnMode === 0) drawArc(layer, alloc.x - pOff, mlgY, r, true, isDanger);
            else drawArc(layer, alloc.x + pOff, mlgY, r, false, isDanger);

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${alloc.x}, ${alloc.y})`);
            g.setAttribute("class", "ac-group");
            g.innerHTML = `
                <path d="M 0,${pDist} L ${-span/2},${pDist+10} L ${span/2},${pDist+10} Z" class="ac-wing" />
                <rect x="${-span/16}" y="0" width="${span/8}" height="${ac.Length*SCALE}" rx="8" class="ac-body" />
                <circle cx="0" cy="0" r="4" fill="red" />
                <circle cx="${alloc.turnMode === 1 ? pOff : -pOff}" cy="${pDist}" class="pivot-dot" />
            `;
            g.onclick = (e) => { e.stopPropagation(); alloc.turnMode = 1 - alloc.turnMode; draw(); updateAudit(alloc, idx); };
            g.ondblclick = (e) => { e.stopPropagation(); allocations.splice(idx, 1); draw(); };
            layer.appendChild(g);
        });
    }

    function drawArc(layer, px, py, r, isRightTurn, isDanger) {
        const marker = isDanger ? 'url(#arrow-danger)' : 'url(#arrow-safe)';
        const pathData = isRightTurn 
            ? `M ${px + r} ${py} A ${r} ${r} 0 0 0 ${px - r} ${py}` 
            : `M ${px - r} ${py} A ${r} ${r} 0 0 1 ${px + r} ${py}`;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute("d", pathData);
        p.setAttribute("class", `swing-path ${isDanger ? 'unsafe' : 'safe'}`);
        p.setAttribute("style", `marker-end: ${marker}`);
        layer.appendChild(p);
    }

    function checkConflict(alloc, myIdx, margin) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const reach = ac.PivotOffset + ac.SweepRadius + margin;
        return allocations.some((other, otIdx) => {
            if (myIdx === otIdx) return false;
            const oAc = db.aircrafts.find(a => a.Model === other.model);
            const dist = Math.abs(alloc.x - other.x) / SCALE;
            const isCorrectSide = (alloc.turnMode === 1 && other.x < alloc.x) || (alloc.turnMode === 0 && other.x > alloc.x);
            return isCorrectSide && (reach + oAc.Span/2 > dist);
        });
    }

    function updateAudit(alloc, idx) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const margin = parseFloat(document.getElementById('extra-margin').value) || 0;
        const totalReach = ac.PivotOffset + ac.SweepRadius + margin;
        
        // ค้นหาเครื่องที่อยู่ฝั่งที่เราเลี้ยวไป
        let neighbor = null, minDist = Infinity;
        allocations.forEach((other, otIdx) => {
            if (idx === otIdx) return;
            const isToward = (alloc.turnMode === 1 && other.x < alloc.x) || (alloc.turnMode === 0 && other.x > alloc.x);
            const d = Math.abs(alloc.x - other.x) / SCALE;
            if (isToward && d < minDist) { minDist = d; neighbor = other; }
        });

        let clearanceHTML = "<p>ไม่พบอากาศยานในทิศทางที่เลี้ยว</p>";
        let isCollision = false;

        if (neighbor) {
            const oAc = db.aircrafts.find(a => a.Model === neighbor.model);
            const netClearance = minDist - (totalReach + oAc.Span/2);
            isCollision = netClearance < 0;
            clearanceHTML = `
                <p>เทียบกับ: <b>${neighbor.model} (${neighbor.standId})</b></p>
                <span class="formula">ระยะห่าง Center-to-Center: ${minDist.toFixed(2)}m</span>
                <span class="formula">ระยะเหวี่ยง (รวม Margin): ${totalReach.toFixed(2)}m</span>
                <span class="formula">ครึ่งปีกเครื่องข้างๆ: ${(oAc.Span/2).toFixed(2)}m</span>
                <hr>
                <p>ระยะห่างสุทธิ (Net Clearance):</p>
                <div class="clearance-val ${isCollision ? 'val-danger' : 'val-safe'}">
                    ${netClearance.toFixed(2)} เมตร
                </div>
            `;
        }

        document.getElementById('audit-content').innerHTML = `
            <div class="audit-card">
                <b>📍 หลุม: ${alloc.standId} (${ac.Model})</b><br>
                โหมด: ${alloc.turnMode === 0 ? 'เลี้ยวขวา (Pivot RH)' : 'เลี้ยวซ้าย (Pivot LH)'}<br>
                Safety Margin: +${margin}m
                <hr>
                ${clearanceHTML}
            </div>
        `;
    }

    function cancelSelection() {
        selectedAC = null;
        document.getElementById('ghost-group').style.display = 'none';
        document.getElementById('cancel-btn').style.display = 'none';
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
    }

    init();
</script>
</body>
</html>
