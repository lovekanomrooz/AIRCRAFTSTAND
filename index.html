<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Stand Planner Pro v9 - Smart Geometry</title>
    <style>
        :root { --safe: #2ecc71; --danger: #e74c3c; --accent: #f1c40f; --bg: #111; --panel: #222; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* Top Navigation */
        #top-bar { height: 110px; background: var(--panel); border-bottom: 2px solid #333; padding: 10px 20px; display: flex; gap: 15px; align-items: center; z-index: 1000; }
        .ac-list-container { display: flex; gap: 8px; overflow-x: auto; flex-grow: 1; }
        .ac-item { min-width: 130px; background: #34495e; padding: 12px; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; border: 2px solid transparent; font-size: 0.9rem; }
        .ac-item.selected { background: var(--accent); color: #000; }
        
        .tool-box { background: #2c3e50; padding: 10px; border-radius: 8px; font-size: 0.85rem; min-width: 250px; }

        /* Viewport */
        #viewport { flex-grow: 1; overflow: auto; background: #000; position: relative; }
        svg { background: #111; min-width: 5000px; height: 100%; }

        /* SVG Layers */
        .stand-box { fill: rgba(255,255,255,0.01); stroke: #444; stroke-width: 1; }
        .no-go-line { stroke: var(--danger); stroke-width: 1.5; stroke-dasharray: 5; fill: none; }
        .t-mark { fill: var(--accent); opacity: 0.6; cursor: pointer; }
        .t-mark:hover { r: 10; opacity: 1; }

        .swing-path { fill: rgba(255, 255, 255, 0.02); stroke-width: 3; pointer-events: none; }
        .safe { stroke: var(--safe); }
        .unsafe { stroke: var(--danger); }
        
        .gap-line { stroke: #3498db; stroke-width: 2; stroke-dasharray: 5; pointer-events: none; }
        .gap-text { fill: #3498db; font-size: 14px; font-weight: bold; paint-order: stroke; stroke: #000; stroke-width: 3px; }

        .ac-group { cursor: pointer; pointer-events: all; }
        .ac-body { fill: #fff; stroke: #333; }
        .active-ac .ac-body { stroke: var(--accent); stroke-width: 3; filter: drop-shadow(0 0 5px var(--accent)); }
        .pivot-dot { fill: #ff4757; r: 5; pointer-events: none; }

        /* Floating Audit Panel */
        /* ปรับปรุง CSS ของ Audit Float */
#audit-float { 
    position: fixed; /* เปลี่ยนเป็น fixed เพื่อให้ไม่เลื่อนตามการ scroll ของลานจอด */
    top: 130px; 
    right: 20px; 
    width: 450px; 
    background: rgba(25, 25, 25, 0.95); 
    border: 2px solid #444; 
    border-radius: 10px; 
    z-index: 2000;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}
        .audit-card { line-height: 1.6; font-size: 0.95rem; }
        .formula { color: var(--accent); font-family: monospace; display: block; margin: 5px 0; }
        #ghost-group { pointer-events: none; display: none; opacity: 0.3; }
    </style>
</head>
<body>

<!-- ปรับปรุงส่วน Header -->
<header id="top-bar">
    <div class="tool-box">
        🎯 <b>โหมด:</b> 
        <select id="place-mode" style="background:#444; color:white; border:none; padding:5px; border-radius:4px;">
            <option value="snap">Snap T-Mark</option>
            <option value="free">อิสระ (Parallel)</option>
        </select>
        <br>
        🔄 <b>Rotation:</b> 
        <input type="number" id="ac-rot-num" value="0" style="width:50px; background:#444; color:var(--accent); border:1px solid #666;" oninput="syncRot(this.value, 'slider')">
        <input type="range" id="ac-rot-slider" min="0" max="360" value="0" style="width:100px" oninput="syncRot(this.value, 'input')">
    </div>
    <div class="config-box">
        <label>📏 Safety Margin เพิ่มเติม:</label><br>
        <input type="number" id="extra-margin" style="width:70px; padding:5px; margin-top:5px; background:#444; color:var(--accent); border:1px solid #666;" value="0" oninput="draw()"> <b>เมตร</b>
    </div>
    <div class="ac-list-container" id="aircraft-list"></div>
</header>

<div id="viewport">
    <svg id="apron-svg" onmousemove="moveGhost(event)" onclick="handleSvgClick(event)">
        <defs>
            <marker id="arrow-safe" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
            <marker id="arrow-danger" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
        </defs>
        <g id="bg-layer"></g>
        <g id="swing-layer"></g>
        <g id="ac-layer"></g>
        <g id="ghost-group"><path id="ghost-wing" fill="#ced6e0"/><rect id="ghost-body" fill="#fff" rx="8"/></g>
    </svg>

    <!-- Floating Audit Panel -->
    <div id="audit-float" style="cursor: move;">
    <div id="audit-drag-handle" style="background:var(--accent); color:black; padding:5px; font-weight:bold; border-radius:8px 8px 0 0; text-align:center; font-size:12px;">📊 รายละเอียด (ลากเพื่อย้าย)</div>
    <div id="audit-content" class="audit-card" style="padding:15px; max-height:70vh; overflow-y:auto;"></div>
    <button onclick="document.getElementById('audit-float').style.display='none'" style="width:100%; background:#444; color:white; border:none; padding:8px; border-radius:0 0 8px 8px; cursor:pointer;">ปิดหน้าต่างนี้</button>
</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";
    let db = { aircrafts: [], stands: [], clearanceRules: [] };
    let allocations = []; 
    let selectedAC = null, activeIdx = null, currentRotation = 0, xMap = {};
    const SCALE = 4, HEADER_Y = 100;
dragElement(document.getElementById("audit-float"));

function dragElement(elmnt) {
  var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  if (document.getElementById("audit-drag-handle")) {
    document.getElementById("audit-drag-handle").onmousedown = dragMouseDown;
  }
  function dragMouseDown(e) {
    e.preventDefault();
    pos3 = e.clientX; pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    document.onmousemove = elementDrag;
  }
  function elementDrag(e) {
    e.preventDefault();
    pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
    pos3 = e.clientX; pos4 = e.clientY;
    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
  }
  function closeDragElement() {
    document.onmouseup = null; document.onmousemove = null;
  }
}
    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            renderList();
            draw();
        } catch (e) { alert("GS Connection Failed"); }
    }

    function renderList() {
        const list = document.getElementById('aircraft-list');
        list.innerHTML = '';
        db.aircrafts.forEach(ac => {
            const div = document.createElement('div');
            div.className = 'ac-item';
            div.innerText = ac.Model;
            div.onclick = () => {
                document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                selectedAC = ac;
                document.getElementById('ghost-group').style.display = 'block';
                document.getElementById('cancel-btn').style.display = 'block';
                updateRotPreview(currentRotation);
            };
            list.appendChild(div);
        });
    }

    function updateRotPreview(val) {
        currentRotation = parseInt(val);
        document.getElementById('deg-val').innerText = val;
        if (!selectedAC) return;
        const span = selectedAC.Span * SCALE, n2p = selectedAC.NoseToPivot * SCALE, len = selectedAC.Length * SCALE;
        document.getElementById('ghost-wing').setAttribute("d", `M 0,${n2p} L ${-span/2},${n2p+10} L ${span/2},${n2p+10} Z`);
        document.getElementById('ghost-body').setAttribute("x", -span/16);
        document.getElementById('ghost-body').setAttribute("width", span/8);
        document.getElementById('ghost-body').setAttribute("height", len);
    }

    function moveGhost(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        document.getElementById('ghost-group').setAttribute("transform", `translate(${pt.x}, ${pt.y}) rotate(${currentRotation})`);
    }

    function getSvgPt(e) {
        const svg = document.getElementById('apron-svg');
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function handleSvgClick(e) {
        if (!selectedAC) return;
        const pt = getSvgPt(e);
        const mode = document.getElementById('place-mode').value;
        let bestSt = null, snapX = pt.x, snapY = pt.y;

        const sorted = [...db.stands].sort((a,b) => (b.ParentID?1:0) - (a.ParentID?1:0));
        for (let st of sorted) {
            const cx = xMap[st.StandID], hw = (st.Width * SCALE) / 2;
            if (pt.x >= cx - hw && pt.x <= cx + hw) {
                bestSt = st.StandID;
                if (mode === 'snap') {
                    const t1 = HEADER_Y + (12.5*SCALE), t2 = HEADER_Y + (30*SCALE);
                    snapY = Math.abs(pt.y - t1) < Math.abs(pt.y - t2) ? t1 : t2;
                    snapX = cx;
                }
                break;
            }
        }

        if (bestSt) {
            const st = db.stands.find(s => s.StandID === bestSt);
            const minY = HEADER_Y + (12.5*SCALE), maxY = HEADER_Y + (st.Length-12.5)*SCALE;
            if (snapY < minY || snapY > maxY) { alert("อยู่นอกเขตปลอดภัย (12.5ม.)"); return; }

            allocations.push({ id: Date.now(), standId: bestSt, model: selectedAC.Model, x: snapX, y: snapY, rotation: currentRotation, turnMode: 0 });
            activeIdx = allocations.length - 1;
            cancelSelection();
            draw();
        }
    }

    function draw() {
        const bg = document.getElementById('bg-layer');
        const sw = document.getElementById('swing-layer');
        const acL = document.getElementById('ac-layer');
        bg.innerHTML = ''; sw.innerHTML = ''; acL.innerHTML = '';

        let curX = 50; xMap = {};

        // 1. วาดหลุมจอด
        db.stands.forEach(st => {
            const w = st.Width * SCALE, l = st.Length * SCALE;
            let cx = (st.ParentID && xMap[st.ParentID]) ? xMap[st.ParentID] + (st.OffsetX * SCALE) : (curX + w/2);
            xMap[st.StandID] = cx;
            if (!st.ParentID) curX += w;

            bg.innerHTML += `<rect x="${cx-w/2}" y="${HEADER_Y}" width="${w}" height="${l}" class="stand-box" />`;
            bg.innerHTML += `<rect x="${cx-w/2}" y="${HEADER_Y + (12.5*SCALE)}" width="${w}" height="${l - (25*SCALE)}" class="no-go-line" />`;
            bg.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 12.5*SCALE}" r="6" class="t-mark" />`;
            bg.innerHTML += `<circle cx="${cx}" cy="${HEADER_Y + 30.0*SCALE}" r="6" class="t-mark" />`;
            bg.innerHTML += `<text x="${cx}" y="${HEADER_Y + l + 20}" fill="#888" text-anchor="middle" font-size="11">${st.StandID}</text>`;
        });

        // 2. วาดเครื่องบิน
        allocations.forEach((alloc, idx) => {
            const ac = db.aircrafts.find(a => a.Model === alloc.model);
            const rad = (alloc.rotation - 90) * Math.PI / 180;
            const pDist = ac.NoseToPivot * SCALE, pOff = ac.PivotOffset * SCALE, r = ac.SweepRadius * SCALE;
            
            const mlgCx = alloc.x - Math.cos(rad) * pDist;
            const mlgCy = alloc.y - Math.sin(rad) * pDist;

            const isDanger = checkCollision(alloc, idx);

            // Swing Path (180 Arc Top)
            const pivotX = (alloc.turnMode === 0) ? mlgCx + Math.cos(rad+Math.PI/2)*pOff : mlgCx - Math.cos(rad+Math.PI/2)*pOff;
            const pivotY = (alloc.turnMode === 0) ? mlgCy + Math.sin(rad+Math.PI/2)*pOff : mlgCy - Math.sin(rad+Math.PI/2)*pOff;
            drawArc(sw, pivotX, pivotY, r, alloc.turnMode === 0, isDanger, alloc.rotation);

            // Model
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${alloc.x}, ${alloc.y}) rotate(${alloc.rotation})`);
            g.setAttribute("class", `ac-group ${activeIdx === idx ? 'active-ac' : ''}`);
            g.innerHTML = `
                <path d="M 0,${pDist} L ${-ac.Span*SCALE/2},${pDist+10} L ${ac.Span*SCALE/2},${pDist+10} Z" class="ac-wing" />
                <rect x="${-ac.Span*SCALE/16}" y="0" width="${ac.Span*SCALE/8}" height="${ac.Length*SCALE}" rx="8" class="ac-body" />
                <circle cx="0" cy="0" r="4" fill="red" />
            `;
            g.onclick = (e) => { e.stopPropagation(); activeIdx = idx; alloc.turnMode = 1 - alloc.turnMode; draw(); };
            g.ondblclick = (e) => { e.stopPropagation(); allocations.splice(idx, 1); activeIdx = null; draw(); };
            acL.appendChild(g);

            // Pivot Dot
            sw.innerHTML += `<circle cx="${pivotX}" cy="${pivotY}" class="pivot-dot" />`;

            // Draw Dynamic Gap
            calculateAndDrawGaps(sw, alloc, idx);
        });

        if (activeIdx !== null && allocations[activeIdx]) updateAudit(allocations[activeIdx], activeIdx);
    }

    // 1. ฟังก์ชัน Sync การหมุนระหว่าง Slider และ Input
function syncRot(val, target) {
    if (target === 'slider') document.getElementById('ac-rot-slider').value = val;
    else document.getElementById('ac-rot-num').value = val;
    updateRotPreview(val);
}

// 2. ปรับปรุงการวาด Arc ให้เป็น 180 องศาด้านบน (Nose side)
function drawArc(layer, px, py, r, isRight, isDanger, rot) {
    const marker = isDanger ? 'url(#arrow-danger)' : 'url(#arrow-safe)' ;
    const baseRad = (rot - 90) * Math.PI / 180;
    
    // คำนวณจุดเริ่มต้น (ปีกข้างนึง) และจุดจบ (ปีกอีกข้างนึง) โดยกวาดผ่านด้านหน้า
    // ถ้าเลี้ยวขวา (Right): หมุนรอบ RH -> กวาดจากปีกซ้ายขึ้นไป
    const startAngle = isRight ? baseRad + Math.PI : baseRad; 
    const endAngle = isRight ? baseRad : baseRad - Math.PI;

    const startX = px + Math.cos(startAngle) * r;
    const startY = py + Math.sin(startAngle) * r;
    const endX = px + Math.cos(endAngle) * r;
    const endY = py + Math.sin(endAngle) * r;

    const d = `M ${startX} ${startY} A ${r} ${r} 0 0 ${isRight ? 1 : 0} ${endX} ${endY}`;
    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", d);
    p.setAttribute("class", `swing-path ${isDanger?'unsafe':'safe'}`);
    p.setAttribute("style", `marker-end: ${marker}; fill: none;`);
    layer.appendChild(p);
}

   // 3. ปรับปรุงการคำนวณระยะห่างจุดที่ใกล้ที่สุด (Smart Gap)
function calculateAndDrawGaps(layer, alloc, idx) {
    const myAc = db.aircrafts.find(a => a.Model === alloc.model);
    const myStand = db.stands.find(s => s.StandID === alloc.standId);

    allocations.forEach((other, otIdx) => {
        if (idx === otIdx) return;
        const otAc = db.aircrafts.find(a => a.Model === other.model);
        
        // เช็คเฉพาะหลุมข้างเคียง
        const distCenter = Math.abs(alloc.x - other.x) / SCALE;
        if (distCenter > (myAc.Span + otAc.Span)) return;

        // จุดพิจารณาของเครื่องข้างๆ (หัว, ท้าย, ปีกซ้าย, ปีกขวา)
        const radOther = (other.rotation - 90) * Math.PI / 180;
        const otherPoints = [
            {x: other.x, y: other.y}, // หัว
            {x: other.x - Math.cos(radOther)*(otAc.Length*SCALE), y: other.y - Math.sin(radOther)*(otAc.Length*SCALE)}, // ท้าย
            {x: other.x + Math.cos(radOther + Math.PI/2)*(otAc.Span*SCALE/2), y: other.y + Math.sin(radOther + Math.PI/2)*(otAc.Span*SCALE/2)}, // ปีกซ้าย
            {x: other.x - Math.cos(radOther + Math.PI/2)*(otAc.Span*SCALE/2), y: other.y - Math.sin(radOther + Math.PI/2)*(otAc.Span*SCALE/2)}  // ปีกขวา
        ];

        // จุดที่ใกล้ที่สุดจากปีกเราไปเครื่องข้างๆ
        const myWingX = (other.x > alloc.x) ? alloc.x + (myAc.Span*SCALE/2) : alloc.x - (myAc.Span*SCALE/2);
        const myWingY = alloc.y + (myAc.NoseToPivot * SCALE);
        
        let minDist = Infinity;
        let targetPt = otherPoints[0];

        otherPoints.forEach(pt => {
            const d = Math.sqrt(Math.pow(myWingX - pt.x, 2) + Math.pow(myWingY - pt.y, 2));
            if (d < minDist) { minDist = d; targetPt = pt; }
        });

        const realGap = minDist / SCALE;
        if (alloc.x < other.x) { // วาดเส้นบอกระยะห่าง
            layer.innerHTML += `<line x1="${myWingX}" y1="${myWingY}" x2="${targetPt.x}" y2="${targetPt.y}" class="gap-line" />`;
            layer.innerHTML += `<text x="${(myWingX+targetPt.x)/2}" y="${(myWingY+targetPt.y)/2 - 5}" class="gap-text" text-anchor="middle">${realGap.toFixed(2)}m</text>`;
        }
    });
}

    function checkCollision(alloc, idx) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const reach = ac.PivotOffset + ac.SweepRadius;
        return allocations.some((other, otIdx) => {
            if (idx === otIdx) return false;
            const oAc = db.aircrafts.find(a => a.Model === other.model);
            const dist = Math.sqrt(Math.pow(alloc.x - other.x, 2) + Math.pow(alloc.y - other.y, 2)) / SCALE;
            return dist < (reach + oAc.Span/2);
        });
    }

    // 4. ปรับปรุง Audit Panel ให้แสดงรายละเอียดตามที่ต้องการ
function updateAudit(alloc, idx) {
    const ac = db.aircrafts.find(a => a.Model === alloc.model);
    const rule = db.clearanceRules.find(r => r.Code === ac.Code) || { MinClearance: 4.5 };
    const extraMargin = parseFloat(document.getElementById('extra-margin').value) || 0;
    
    // รัศมีกวาดรวม (R_Total = PivotOffset + R4 + ExtraMargin)
    const totalReach = ac.PivotOffset + ac.SweepRadius + extraMargin;
    
    const float = document.getElementById('audit-float');
    float.style.display = 'block';

    // ค้นหา Net Clearance
    let neighbor = null, minDist = Infinity;
    allocations.forEach((other, otIdx) => {
        if (idx === otIdx) return;
        const d = Math.abs(alloc.x - other.x) / SCALE;
        const isToward = (alloc.turnMode === 0 && other.x > alloc.x) || (alloc.turnMode === 1 && other.x < alloc.x);
        if (isToward && d < minDist) { minDist = d; neighbor = other; }
    });

    let netClearanceText = "N/A";
    if (neighbor) {
        const otAc = db.aircrafts.find(a => a.Model === neighbor.model);
        const gapVal = minDist - (totalReach + (otAc.Span/2));
        netClearanceText = `${gapVal.toFixed(2)} ม. ${gapVal < 0 ? '❌ ชน' : '✅ พ้น'}`;
    }

    document.getElementById('audit-content').innerHTML = `
        <div style="border-bottom:1px solid #555; padding-bottom:10px; margin-bottom:10px;">
            <b style="font-size:1.2em; color:var(--accent);">📍 ${alloc.standId}</b><br>
            <b>รุ่น:</b> ${ac.Model} (Type ${ac.Code})
        </div>
        <b>1. การคำนวณรัศมีการกวาด:</b>
        <span class="formula">R_Total = Pivot(${ac.PivotOffset}m) + R4(${ac.SweepRadius}m) + Extra(${extraMargin}m)</span>
        <b style="color:var(--accent);">รวม = ${totalReach.toFixed(2)} เมตร</b><br><br>
        
        <b>2. ระยะห่างขณะเลี้ยว (Net Clearance):</b>
        <span class="formula">ระยะห่าง Center-to-Center: ${neighbor ? minDist.toFixed(2) : '-'} ม.</span>
        <b style="font-size:1.1em;">เหลือจริง: ${netClearanceText}</b><br><br>

        <b>3. ระยะห่างปีกขณะจอด (Static):</b>
        <span class="formula">เกณฑ์มาตรฐาน Type ${ac.Code}: ห้ามต่ำกว่า ${rule.MinClearance} เมตร</span>
        <span style="font-size:0.9em; color:#aaa;">*ใช้ตรวจสอบเทียบกับเส้นประสีฟ้าบนแผนผัง</span>
    `;
}

    function cancelSelection() {
        selectedAC = null;
        document.getElementById('ghost-group').style.display = 'none';
        document.getElementById('cancel-btn').style.display = 'none';
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
    }

    init();
</script>
</body>
</html>
