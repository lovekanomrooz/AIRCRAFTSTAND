<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Stand Planner - Parallel & Tandem Support</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2d2d2d; --safe: #2ecc71; --danger: #e74c3c; --accent: #f1c40f; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        #sidebar { width: 300px; background: var(--panel); padding: 20px; border-right: 2px solid #000; overflow-y: auto; z-index: 100; }
        .ac-item { background: #4b6584; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.2s; }
        .ac-item:hover { background: #778ca3; }
        .ac-item.selected { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent); }

        #viewport { flex-grow: 1; overflow: auto; background: #111; position: relative; }
        svg { background: #1a1a1a; min-width: 5000px; height: 100%; cursor: crosshair; }

        .headerline { stroke: white; stroke-width: 4; }
        .t-mark { fill: var(--accent); cursor: pointer; transition: 0.2s; }
        .t-mark:hover { r: 12; fill: #fff; }
        .t-text { fill: var(--accent); font-size: 11px; font-weight: bold; pointer-events: none; }
        .stand-box { fill: rgba(255,255,255,0.02); stroke: #444; }
        .stand-label { fill: #888; font-size: 13px; pointer-events: none; }

        .swing-path { fill: none; stroke-width: 3; pointer-events: none; }
        .safe { stroke: var(--safe); }
        .unsafe { stroke: var(--danger); }
        
        .ac-body { fill: #fff; stroke: #333; cursor: pointer; }
        .ac-wing { fill: #bdc3c7; stroke: #333; }
        
        /* Ghost Plane - ต้องตั้ง pointer-events: none เพื่อให้คลิกทะลุไปหา T-Mark ได้ */
        #ghost-group { pointer-events: none; display: none; }

        #status-bar { position: absolute; top: 10px; left: 320px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; font-size: 13px; border: 1px solid #444; z-index: 50; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="color: var(--safe)">✈️ คลังเครื่องบิน</h3>
    <div id="aircraft-list">โหลดข้อมูล...</div>
    <hr style="border: 0.5px solid #444; margin: 20px 0;">
    <div style="font-size: 0.85em; color: #aaa; line-height: 1.6;">
        <b>คำแนะนำ:</b><br>
        1. คลิกเครื่องบิน -> คลิกจุด <span style="color:var(--accent)">●</span> T1/T2<br>
        2. <b>Parallel/Tandem:</b> สามารถวางเครื่องบินที่ T1 และ T2 พร้อมกันได้<br>
        3. คลิกที่ตัวเครื่องเพื่อเปลี่ยนโหมดเลี้ยว<br>
        4. ดับเบิลคลิกเครื่องบินเพื่อลบออก
    </div>
    <button id="cancel-btn" onclick="cancelSelection()" style="display:none; width:100%; margin-top:15px; padding:10px; background:var(--danger); border:none; color:white; border-radius:4px; cursor:pointer;">ยกเลิกการเลือก</button>
</div>

<div id="viewport">
    <div id="status-bar">🛰️ กำลังเชื่อมต่อ...</div>
    <svg id="apron-svg" onmousemove="moveGhost(event)">
        <defs>
            <marker id="arrow-safe" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
            <marker id="arrow-danger" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
        </defs>
        <g id="main-layer"></g>
        <g id="ghost-group">
            <path id="ghost-wing" d="" fill="#ced6e0" opacity="0.4" />
            <rect id="ghost-body" x="0" y="0" width="0" height="0" rx="8" fill="#fff" opacity="0.4" />
        </g>
    </svg>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx5apqROG0s7dmeu5vhyyvPSvmPrg9GWaBtQ4paa4nYwGbshW4TRmnCFDmryLJEBpDL/exec";

    let db = { aircrafts: [], stands: [] };
    let allocations = []; // { id, standId, model, tMark, mode: 0, x, y }
    let selectedAC = null;
    const SCALE = 4;
    const HEADER_Y = 150;

    async function init() {
        try {
            const res = await fetch(API_URL);
            db = await res.json();
            document.getElementById('status-bar').innerHTML = "🟢 ฐานข้อมูลออนไลน์: พร้อมใช้งาน";
            renderList();
            draw();
        } catch (e) { document.getElementById('status-bar').innerHTML = "🔴 เชื่อมต่อฐานข้อมูลล้มเหลว"; }
    }

    function renderList() {
        const list = document.getElementById('aircraft-list');
        list.innerHTML = '';
        db.aircrafts.forEach(ac => {
            const div = document.createElement('div');
            div.className = 'ac-item';
            div.innerText = ac.Model;
            div.onclick = () => selectAC(ac, div);
            list.appendChild(div);
        });
    }

    function selectAC(ac, el) {
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        selectedAC = ac;
        document.getElementById('ghost-group').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';

        const span = ac.Span * SCALE, len = ac.Length * SCALE, noseToPivot = ac.NoseToPivot * SCALE;
        document.getElementById('ghost-wing').setAttribute("d", `M 0,${noseToPivot} L ${-span/2},${noseToPivot+10} L ${span/2},${noseToPivot+10} Z`);
        document.getElementById('ghost-body').setAttribute("x", -span/16);
        document.getElementById('ghost-body').setAttribute("width", span/8);
        document.getElementById('ghost-body').setAttribute("height", len);
    }

    function cancelSelection() {
        selectedAC = null;
        document.getElementById('ghost-group').style.display = 'none';
        document.getElementById('cancel-btn').style.display = 'none';
        document.querySelectorAll('.ac-item').forEach(i => i.classList.remove('selected'));
    }

    function moveGhost(e) {
        if (!selectedAC) return;
        const svg = document.getElementById('apron-svg');
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        const cursor = pt.matrixTransform(svg.getScreenCTM().inverse());
        document.getElementById('ghost-group').setAttribute("transform", `translate(${cursor.x}, ${cursor.y})`);
    }

    function draw() {
        const layer = document.getElementById('main-layer');
        layer.innerHTML = '';
        let xPosMap = {}, currentX = 100;

        // 1. วาดหลุมจอด
        db.stands.forEach(st => {
            const standW = st.Width * SCALE, standL = st.Length * SCALE;
            let centerX = st.ParentID ? xPosMap[st.ParentID] + (st.OffsetX * SCALE) : currentX + (standW / 2);
            xPosMap[st.StandID] = centerX;

            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", centerX - standW/2); rect.setAttribute("y", HEADER_Y);
            rect.setAttribute("width", standW); rect.setAttribute("height", standL);
            rect.setAttribute("class", "stand-box");
            layer.appendChild(rect);

            layer.innerHTML += `<line x1="${centerX-standW/2}" y1="${HEADER_Y}" x2="${centerX+standW/2}" y2="${HEADER_Y}" class="headerline" />`;
            
            addTMark(layer, centerX, HEADER_Y + (12.5 * SCALE), "T1", st.StandID);
            addTMark(layer, centerX, HEADER_Y + (30.0 * SCALE), "T2", st.StandID);
            
            layer.innerHTML += `<text x="${centerX}" y="${HEADER_Y + standL + 25}" class="stand-label" text-anchor="middle">${st.StandID}</text>`;
            if (!st.ParentID) currentX += standW + (5 * SCALE);
        });

        // 2. วาดเครื่องบินและเช็คความปลอดภัยทุกลำ (Global Check)
        allocations.forEach((alloc, idx) => {
            const ac = db.aircrafts.find(a => a.Model === alloc.model);
            const noseY = HEADER_Y + (alloc.tMark === 'T1' ? 12.5 : 30) * SCALE;
            const pivotY = noseY + (ac.NoseToPivot * SCALE);
            const centerX = xPosMap[alloc.standId];

            // ตรวจสอบความปลอดภัยเทียบกับ "ทุกเครื่อง" ในลานจอด
            const isLUnsafe = checkSafety(alloc, 'Left', centerX, xPosMap);
            const isRUnsafe = checkSafety(alloc, 'Right', centerX, xPosMap);

            if (alloc.mode === 0 || alloc.mode === 1) drawSwing(layer, centerX, pivotY, ac, true, isLUnsafe);
            if (alloc.mode === 0 || alloc.mode === 2) drawSwing(layer, centerX, pivotY, ac, false, isRUnsafe);

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${centerX}, ${noseY})`);
            g.innerHTML = `
                <path d="M 0,${ac.NoseToPivot*SCALE} L ${-ac.Span*SCALE/2},${(ac.NoseToPivot+3)*SCALE} L ${ac.Span*SCALE/2},${(ac.NoseToPivot+3)*SCALE} Z" class="ac-wing" />
                <rect x="${-ac.Span*SCALE/16}" y="0" width="${ac.Span*SCALE/8}" height="${ac.Length*SCALE}" rx="8" class="ac-body" />
                <circle cx="0" cy="0" r="4" fill="red" />
                <text y="-10" fill="yellow" text-anchor="middle" font-size="12" font-weight="bold">${ac.Model}</text>
            `;
            g.onclick = (e) => { e.stopPropagation(); allocations[idx].mode = (alloc.mode + 1) % 3; draw(); };
            g.ondblclick = (e) => { e.stopPropagation(); allocations.splice(idx, 1); draw(); };
            layer.appendChild(g);
        });
    }

    function addTMark(layer, x, y, label, standId) {
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 9); c.setAttribute("class", "t-mark");
        c.onclick = (e) => {
            e.stopPropagation();
            if (!selectedAC) return;

            // ตรวจสอบกฎ MARS (หลุม Parent/Child ห้ามทับซ้อนกัน)
            const st = db.stands.find(s => s.StandID === standId);
            if (st.ParentID) { // ถ้าเป็นหลุมย่อย ห้ามหลุมหลักมีเครื่อง
                if (allocations.some(a => a.standId === st.ParentID)) { alert("หลุมหลักถูกใช้งานอยู่"); return; }
            } else { // ถ้าเป็นหลุมหลัก ห้ามหลุมย่อยมีเครื่อง
                if (allocations.some(a => db.stands.find(s => s.StandID === a.standId).ParentID === standId)) { alert("หลุมย่อยถูกใช้งานอยู่"); return; }
            }

            // เพิ่มเครื่องบิน (อนุญาตให้ Tandem จอด T1 และ T2 พร้อมกันในหลุมเดียวกัน)
            allocations = allocations.filter(a => !(a.standId === standId && a.tMark === label));
            allocations.push({ standId, model: selectedAC.Model, tMark: label, mode: 0 });
            cancelSelection();
            draw();
        };
        layer.appendChild(c);
        layer.innerHTML += `<text x="${x+15}" y="${y+5}" class="t-text">${label}</text>`;
    }

    function drawSwing(layer, cx, py, ac, isLeft, isDanger) {
        const r = ac.SweepRadius * SCALE, pOffset = ac.PivotOffset * SCALE;
        const px = isLeft ? cx + pOffset : cx - pOffset;
        const marker = isDanger ? 'url(#arrow-danger)' : 'url(#arrow-safe)';
        const d = `M ${px + (isLeft ? -r : r)} ${py} A ${r} ${r} 0 0 ${isLeft?1:0} ${px} ${py-r}`;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute("d", d); p.setAttribute("class", `swing-path ${isDanger?'unsafe':'safe'}`);
        p.setAttribute("style", `marker-end: ${marker}`);
        layer.appendChild(p);
    }

    function checkSafety(alloc, side, myCenterX, xPosMap) {
        const ac = db.aircrafts.find(a => a.Model === alloc.model);
        const reach = ac.PivotOffset + ac.SweepRadius;

        return allocations.some(other => {
            if (other === alloc) return false;
            const oAc = db.aircrafts.find(a => a.Model === other.model);
            const oCenterX = xPosMap[other.standId];
            
            // ตรวจสอบระยะห่างระหว่าง Centerline (ระยะทางแนวนอน)
            const horizontalDist = Math.abs(myCenterX - oCenterX) / SCALE;
            const isCorrectSide = (side === 'Left' && oCenterX < myCenterX) || (side === 'Right' && oCenterX > myCenterX);

            // ถ้าเครื่องบินอยู่ทางทิศที่จะเลี้ยว และรัศมีเหวี่ยง + ปีกเครื่องข้างๆ > ระยะห่าง = ชน
            if (isCorrectSide && (reach + (oAc.Span / 2) > horizontalDist)) {
                // เพิ่มเติม: เช็คระยะแนวตั้ง (Y) หากเป็นการจอดแบบ Tandem ในหลุมเดียวกันหรือหลุมข้างๆ
                const myNoseY = HEADER_Y + (alloc.tMark === 'T1' ? 12.5 : 30) * SCALE;
                const oNoseY = HEADER_Y + (other.tMark === 'T1' ? 12.5 : 30) * SCALE;
                const verticalDist = Math.abs(myNoseY - oNoseY) / SCALE;

                // ถ้าอยู่ไกลกันมากในแนวตั้ง (เช่น จอดหัวแถวกับท้ายแถว) รัศมีอาจไม่ถึงกัน
                // แต่เพื่อความปลอดภัยในระบบนี้ เราจะอ้างอิงระยะเหวี่ยงเป็นหลัก
                return true; 
            }
            return false;
        });
    }

    init();
</script>
</body>
</html>
